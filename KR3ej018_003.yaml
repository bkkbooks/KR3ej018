body:
  text: 下卷汗症總括小兒自汗症多端切莫將為一例看要識陰陽虛實候勤勤調理自平安脈法脈大而虛浮而濡者在尺為自汗在寸為盜汗傷寒脈陰陽俱緊當無汗若自汗為亡陽之症不治內經曰心之液為汗原病式曰心熱則汗出東垣云西南坤土也在人為脾胃夫人之汗猶天地之雨陰滋其濕則為霧露為雨也按內經獨主於心而東垣又指脾胃而言何也蓋心為君火主熱脾胃屬土主濕濕熱相搏為汗明矣亦如地之濕氣為雲霧而上升於天若不下降則不成霖雨也夫五臟皆令人出汗獨心與脾胃主其濕熱此乃總司耳故經曰飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾若自汗與盜汗者病雖似而實不同也細詳於後凡汗出發潤一不治也汗出如油二不治也汗凝如珠三不治也通身出汗謂之熱越熱氣越於四體也睡熟汗出醒而收者為盜汗丹溪云自汗屬氣虛人參黃耆少佐以桂枝湯虛甚附子湯亦可盜汗屬血虛當歸六黃湯神效火氣上蒸胃中之濕亦然作汗涼膈散主之小兒脾虛自汗多出額上沾黏人手速救胃氣服全蠍觀音散脾虛瀉自汗遍身冷而出有時遇瀉則無瀉過則有此候大虛急當以參苓白朮散服之肺虛自汗右臉色多㿠白肺脈按之無力久因咳嗽連聲不已乃肺經虛氣上壅致令汗出宜補肺散為治及以藿香飲調脾此又益母救子之義也慢驚自汗遍體俱有其冷如冰此症已危詳慢驚論內有實症自汗外因感受風邪發熱無問昏醒浸浸自汗出當用百解散或間投五苓散有小兒無疾睡中汗出如水覺而經久不幹此名積症盜汗脾冷所致用三稜散有時時冷汗微出髮根如貫珠而額上濈濈然此為驚汗宜抱龍丸及茯神湯加麻黃根服有睡中汗自出者曰盜汗此陽虛所致久不已令人羸脊枯瘦心氣不足津液妄出故也用茯神湯加黃耆煎服附方當歸六黃湯當歸生地熟地黃耆黃連黃芩黃柏涼膈散桔梗薄荷甘草梔子連翹大黃芒硝全蠍觀音散蓮肉人參扁豆天麻防風全蠍羌活白芷木香黃耆茯苓神麯甘草參苓白朮散見霍亂症內補肺散阿膠茯苓蔸鈴糯米杏仁甘草藿香飲人參半夏赤茯甘草蒼朮陳皮藿香厚朴百解散見熱症內一方加升麻五苓散見驚風症內三稜散見諸吐症內抱龍丸見驚風症內茯神湯茯神人參當歸甘草疝症宜與囊腫參看總括疝有七症君須記狐㿗寒水筋血氣總之寒氣結而成丹溪獨斷濕熱致脈法寸口脈弦而緊弦則衛氣不行衛氣不行則惡寒緊則不欲飲食弦緊相搏則為寒疝內經曰腎脈太急沉肝脈太急沉皆為疝又曰三陽結為瘕三陰結為疝批怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收熱則氣泄勞則氣耗思則氣結難經曰任脈之為病其內苦結男子為七疝夫謂七疝者寒水筋血氣狐㿗是也自素問而下俱稱寒氣結聚之所為故令臍腹絞痛也而丹溪獨斷為濕熱焉或者熱鬱於中寒束於外者有矣宜五苓散加茴香橘核金鈴子檳榔木通之類斯愈矣又或肝經濕熱而拗腫痛者服龍膽瀉肝湯附方五苓散見驚風症內龍膽瀉肝湯膽草澤瀉車前子木通生地當歸梔子黃芩甘草治疝神方用胡麻根搗汁入無灰酒調下以渣塗疝四圍效朱仁甫傳滯頤總括滯頤之症口流涎脾家有熱湧而然亦有胃寒而作者蟲痛涎流濕熱兼內經曰足太陰之經通於口蓋脾之液為涎小兒口流涎出而積於頤間者因脾家受病不能收攝耳凡作渴飲冷者屬實熱宜瀉胃火作渴飲湯者屬虛熱宜補中氣若脾經實熱而廉泉不能約制者用牛黃清心丸自批藥鋪中不可用以其藥味不純也不如用萬氏牛黃清心丸較穩脾經虛熱而廉泉不能統攝者用六君子加木香胃經實熱而蟲動津涎流出者用瀉黃散虛熱用五味異功散大便閉結用四順清涼飲食積內熱用大安丸附方六君子湯見瘧疾症內瀉黃散見熱症內五味異功散人參白朮茯苓陳皮甘草四順清涼飲即四順飲見傷寒症內大安丸即保和丸加白朮神麯山楂半夏茯苓陳皮連翹卜子五淋附便濁總括淋痛雖然分五種要明各類在詳明曰膏曰冷同其症血石均為熱一般脈法少陰脈數女子則陰中生瘡男子則為氣淋脈細而緊小便澀滯常有餘瀝不盡此為氣淋其鼻準色黃者知其為小便難而成淋也內經曰清陽出上竅濁陰出下竅故清陽不升則濁陰不降而成淋閉之患矣先哲以滴水之器譬之上竅閉則下竅不出此理甚明故東垣使灸百會丹溪使吐以提其氣之橫格是皆開上竅之法也原病式曰淋者小便澀痛也熱客膀胱鬱結不能滲泄也巢氏曰諸淋皆腎虛所致腎與膀胱為表裡俱主水水入小腸下於胞行於陰為小便也膀胱熱則津液內溢水道不通停積於胞腎氣熱則澀故令水道不利小便淋瀝故謂之淋其狀小便出少而數其小腹急痛引臍是也膏淋者小便時有肥脂似膏而浮於小便之上此腎虛不能制其肥液而下行也冷淋者必先戰栗而後小便此亦腎虛而下焦受冷冷氣入胞與正氣交爭故小便澀而戰栗也熱淋者是下焦有熱熱氣搏於腎流入於胞其溺黃多而澀間有鮮血也血淋者熱之極也心者血之主外行經絡內行臟腑熱盛失其常道心與小腸為表裡故下流而入於胞則為血淋石淋者腎主水水結則化為石腎為熱所乘遇小便則莖中痛不得流利痛引小腹則砂石從小便出甚則塞痛令人昏悶遍身有汗而後醒此痛之使然也並以局方五淋散及香芎丸木通散五苓散導赤散選而用之如腎虛者六味地黃丸加鹿茸川牛膝名補腎地黃丸小腸有氣則小便脹小腸有血則小便澀小腸有熱則小便痛治當行滯清熱疏利小便不可用補氣藥氣得補則愈脹血得補則愈澀熱得補則愈盛此兩段正巢氏所謂諸淋皆腎虛所致也附方五淋散赤芍赤茯苓山梔當歸甘草香芎丸香附川芎海金砂赤茯苓滑石枳殼澤瀉石韋檳榔木通散木通滑石黑醜五苓散見驚風症內導赤散生地木通黃芩赤茯甘草補腎地黃丸即六味地黃丸加鹿茸川牛膝附便濁小便白如米泔者內乳哺失節有傷於脾致令清白不分而色白也久則成疳此亦心膈伏熱兼而得之茯苓散主之可也又云小便白如米泔者乃脾胃受寒而得脾屬陰脾遇寒則飲食愈積滯而不化胃氣愈乖戾而不和致使傳送失常水火不濟故色白也附方茯苓散三稜莪朮砂仁赤茯苓青皮陳皮滑石甘草蟲症總括蟲雖濕熱感而生亦因傷積借成形九種蟲名宜認曉追安二字可詳行脈法蟲脈當沉細而弦今反洪大即知蛔蟲甚也脈沉實者生虛大者死內經曰腸胃為市無物不受無物不包又曰飲食自倍腸胃乃傷夫飲食不能謹節則早損暮傷自傷成積積久成熱濕熱相生而諸般奇形之蟲各從五行之氣而化生矣若腐草為螢是也其蟲或臟腑虛弱而動或食肥甘而動或胃冷而動或胃熱而動動則往來上下腹痛攻心絞痛叫哭仰身揮手心神悶亂吐涎味沫或吐清水腹上青筋是其候也巢氏曰蛔蟲九蟲之一也生生不息多則貫心便能殺人以追蟲丸安蟲散主之九蟲形症一曰伏蟲長四寸許為諸蟲之主二曰蛔蟲三曰白蟲長四五寸許母子相生其形轉大而長亦能殺人四曰內蟲狀如爛杏生之令人心煩五曰肺蟲其狀如蠶令人咳嗽六曰蝟蟲狀如蝦蟆令人嘔吐咳逆七曰弱蟲又名膈蟲狀如瓜瓣令人多睡八曰赤蟲狀如生肉令人腸鳴九曰蟯蟲狀如菜蟲形至微細居廣腸多則為痔劇則為癩因人瘡處以生又如鼷鼠應聲蟲之類未易悉舉批上唇有瘡曰惑蟲食其臟下唇有瘡曰狐蟲食其肛附方追蟲丸檳榔蕪荑雷丸定粉鶴蝨使君子肉安蟲丸鶴蝨檳榔胡粉白礬川楝根半生半熟食前米飲調服目症總括生下經旬目見紅蓋因胎受熱兼風涼肝心藥斯為妙疝氣痘瘡宜別攻脈法左手脈洪數心火炎上也關弦而洪肝火盛也內經曰睹五臟六腑之精榮衛魂魄之所常營也神氣之所常主也又曰諸脈皆屬於目目得血而能視五臟六腑之精氣皆上注於目而為精故黑睛屬肝白睛屬肺瞳仁屬腎上下胞屬脾兩眥屬心而內眥又屬膀胱五臟五色各有所司若因邪氣所並則五臟之精皆失所司不能歸明於目矣錢氏曰目內赤者乃心家積熱上攻宜導赤散加赤茯苓主之淡黃者心虛熱生犀散主之青者肝熱瀉青丸主之黃者脾熱瀉黃散主之夫純陽之子始生旬月忽兩目俱紅炷爛澀癢成翳此因在胎為母感受風熱傳於心肝而得也以導赤散加當歸防風薄荷荊芥大黃目無睛光及白睛多黑睛少者肝腎俱不足也用地黃丸加鹿茸晝視通明夜視罔見者因稟陽氣衰弱遇夜陰盛則陽愈衰故不能視也用沖和養胃湯有熱極夾風則目赤腫痛晝夜不開驚啼不已先用九仙散水薑蔥煎服外以黃連膏點之若痘瘡之後眼生翳障昏澀流淚或浮腫不開此痘瘡餘毒攻肝也用瀉肝散或四物湯加防風蔓荊荊芥柴胡白芷之類若天行時症暴赤腫痛晝夜苦甚久則昏朦治法先以九仙散解表次用小柴胡湯去半夏加大黃薄荷生地竹葉並投草龍膽散血眼者因久咳不已以至眼目兩眶紫黑如被物傷損眼白紅赤如血謂之血眼治之當用生地及黑豆汁研成膏掩眼上而眼眶黑自消其血皆自眼淚而出真良方也河間曰在腑則為表當除風散熱在臟則為里當養血安神如暴失明昏澀翳膜眵淚斑入眼皆風熱也此肝氣盛而發在表也當散而去之若昏弱不欲視物內障見黑花瞳子散大在裡也血少神勞腎虛也宜養血補水安神以調之附方導赤散一見驚風症內一見五淋症內生犀散生犀柴胡乾葛赤芍地骨皮甘草瀉青丸見驚風症內瀉黃散見熱症內沖和養胃湯柴胡人參當歸升麻乾薑乾葛白朮甘草羌活各一兩防風五錢五味一錢黃耆一兩五錢茯苓二錢白芍六錢九仙散柴胡蒼朮赤芍荊芥麻黃川芎薄荷旋覆花甘草黃連膏用川連二錢五分雞子一枚箸頭扎一孔取瓦盞盛之入黃連和勻釀一時見黃色以絹濾過成膏患者仰臥令人挑一匙許頻點目內覺口中苦滿舌上是藥之驗也痘瘡餘毒攻眼眼眵多熱俱妙瀉肝散當歸川芎芍藥防風蒺藜甘菊木賊草荊芥黃連蔓荊子甘草四物湯見痢疾症內小柴胡湯見諸吐症內草龍膽散膽草甘菊草決明荊芥防風木賊草甘草耳症總括五般膿水屬腎生火熱上蒸積而成更有耳聾耳鳴者皆為陰虛火上升脈法左寸洪數心火上炎兩尺洪數相火上炎也內經曰腎者作強之官技巧出焉又曰耳為腎之外候一曰腎通竅於耳夫耳者乃宗脈之所聚腎氣之所通小兒腎臟盛而有熱氣上衝於耳津液壅結則生膿汁也然有五般黃膿出者謂之耵耳紅膿出者謂之膿耳耳內乾臭者謂之沍耳白膿出者謂之纏耳里而虛鳴有青膿出者謂之囊耳病雖有五其源則一或由風水入耳而內有積熱上壅而成者若不速治久則成聾矣以蔓荊子散服之外用敷藥凡耳聾耳鳴者皆屬於熱陰虛火動也治宜瀉南方之火補北方之水無有不安矣錢云腎有補而無瀉有旨哉附方蔓荊子散升麻木通赤芍桑皮生地麥冬前胡甘菊赤茯苓蔓荊子甘草黃龍散敷藥煅礬龍骨末黃丹炒各五錢麝香一匙鼻症總括鼻屬肺兮體至清鼻塞皆因風熱侵忽然窒塞聲音重此是風寒外感因脈法右寸浮洪而數為鼻衄左寸浮緩為傷風鼻塞流清涕內經曰西方白色入通於肺開竅於鼻又曰鼻者肺之外候丹溪曰肺之為臟其位高其體脆性惡寒又惡熱故小兒鼻塞者由肺氣通於鼻氣為陽若氣受風寒停滯鼻間則成鼻塞氣寒而津液不收則多鼻涕若冷風久不散濃涕結聚使鼻不聞香臭則為齆鼻若夾熱則鼻乾皆阻礙乳凡産芽兒三朝五日六晨一臘忽然鼻塞吻乳不能開口呼吸者多是乳母安睡之時不知所持鼻中出息吹著兒囟或洗浴用水溫冷氣不得通氣邪所感致兒鼻多塞也節齋云鼻塞不聞香臭或但遇寒月多塞或略感風寒便塞不時舉發者俗皆以為肺寒而用解表通利辛溫之劑不效殊不知此是肺經素有火邪火鬱甚則喜得熱而惡見寒故遇寒便塞遇感便發也治法清金降火為主而佐以通氣之劑若如常鼻塞不聞香臭者再審其平素只作肺熱治之清金降火清痰或丸藥噙化或末藥輕調緩服無不效矣其平素無鼻塞之症一時遇感風寒而致窒塞聲重或流清涕者自作風寒治鼻瘡者壅熱傷肺肺主氣通於鼻風濕之氣乘虛客於皮毛入於血脈故鼻下兩旁瘡濕癢爛是名鼻𧈟其瘡不痛汁所流處卻又成瘡以澤瀉散服之以清金散敷之一方用熊膽泡湯以新小筆蘸點鼻附方開關散香附川芎荊芥殭蠶細辛牙皂為末蔥白搗成膏用紅白絹攤乘夜睡貼囟門川芎膏川芎細辛藁本白芷杏仁麝香甘草牛黃犀角散牛黃犀角川芎升麻細辛麻黃硃砂冰片麝香甘草蜜丸服澤瀉散澤瀉鬱金梔子甘草青金散銅青生硫磺各一錢一方用生白礬去硫磺喉痹總括喉中腫痛稱喉痹實因相火沖逆至急須刺破湧其痰並敷立效散而愈脈法兩寸脈浮而溢者喉痹也脈微而伏者死內經曰一陰一陽結謂之喉痹王注謂一陰即厥陰肝與胞絡是也一陽即少陽膽與三焦是也四經皆有相火存焉子和曰膽與三焦尋火治肝與胞絡都無異東垣曰火與元氣不兩立一勝則一負蓋元氣一虛則相火隨起而喉痹等暴病作矣夫喉之為會厭者經謂之吸門是也以其司呼吸主升降為人身緊關之橐籥門戶也若夫卒然腫痛水漿不入言語不通死在須臾誠可驚駭其會厭之兩旁腫者俗謂之雙乳蛾易治會厭之一邊腫俗謂之單乳蛾難治古方通謂之喉痹皆相火之所沖逆耳治之先必大涌其痰或以針刺其患處此急則治標之法也用藥者必須以桔梗甘草玄參升麻防風羌活荊芥薄荷山豆根之類服之以立效散敷之可也附方立效散硼砂龍腦雄黃朴硝俱為末乾摻一方治喉痹用韭菜地上蚯蚓數條活入蜂蜜內沒半日去蚓即時服蜜並泥效一急救散用木鱉一個以新汲水磨滴入喉中便退後用湯藥調治之口病總括孩兒胎受諸般熱熱壅三焦病在舌或成鵝口症堪憂用藥更雖針刺裂脈法右關脈洪數者口瘡或為重舌木舌內經曰中央黃色入通於脾開竅於口藏精於脾故病在舌夫口之為病重舌者心脾俱有熱也心候於舌而主血脾之脈絡出於舌下批脾之脈絡系舌旁肝之脈絡系舌本心之脈絡系舌根若心熱則血氣俱盛附於舌根重生壅出如舌而短小是也有生頰裡及上齶者名曰重齶生齒根者名曰重齦皆當刺去其血而用真蒲黃敷之或發灰或馬牙硝或硼砂敷之或竹瀝浸黃柏點之木舌者臟腑壅滯心脾積熱熱氣上衝故令舌腫漸漸脹大塞滿口中是為木舌若不急療必致害人用朴硝二分霜紫一分白鹽半分同研用竹瀝水調敷單用腦子亦效弄舌者脾臟微熱令弄絡微緊時時舒舌治之勿用冷藥下之當少與瀉黃散服亦或飲水醫疑為熱以冷藥下之非也飲水者脾胃虛津液少也又加肌瘦面黃五心煩熱即為瘦疳宜胡黃連丸如大病未愈用藥後弄舌者凶又有舌上白苔並黑色者用硼砂末摻之熱甚者加腦子口糜者乃膀胱移熱於小腸故不小便上為口糜心胃壅熱水穀不轉下傳小腸以導赤散去小腸熱五苓散瀉膀胱熱二劑合用可也鵝口者初生小兒口內白屑舌上如鵝之口此乃胎熱而心脾最盛熏發於口也葛氏以發纏指頭蘸井華水揩拭之以黃丹煅過出火毒摻患處口瘡者乃小兒將養過溫心臟積熱熏蒸於上故成口瘡也宜南星末醋調塗兩足心乳母宜服洗心散瀉心湯丹溪曰小兒口瘡不下食衆以狐惑治之必死批上唇有瘡曰惑蟲食其臟下唇有瘡曰狐蟲食其肛須以礬湯於腳上浸半日頓寬以黃柏蜜炙薑蠶炒為末敷之立下乳而安舌者心之官心熱則生瘡破裂肝壅則血出如壅脾閉則白苔如雪熱則腫滿風則強木口合不開四肢壯熱氣喘語澀皆其候也舌忽腫出口外俗名蜈蚣毒用雄雞血一小盞抹之即縮入舌長過寸研冰片敷之即收口瘡以桑樹汁塗之得愈吞咽亦無妨也大人小兒俱效附方瀉黃散見熱症內胡連丸胡黃連宣黃連各五錢麝香一匙蘆薈一錢硃砂二錢半導赤散見五淋症內五苓散見驚風症內洗心散見傷寒症內瀉心湯見諸熱症內大便結總括小兒便結哭聲高津液不潤為火熬急投煎劑並導法免使兒遭日夜號脈法陽結脈沉實而數陰結脈浮而遲內經北方黑色入通於腎開竅於二陰藏精於腎又曰腎主大便大便難者取足少陰夫腎主五液津液潤則大便如常若飢飽失節勞役過度損傷胃氣及食辛熱味厚之物而助火邪伏於血中耗散真陰津液虧少故大便燥結楊氏曰邪熱入里則內有燥糞三焦伏暑則津液中干此大腸之夾熱也宿食留滯則腹脹痛悶胸痞欲嘔熱氣燔灼則內受風熱堅燥閉塞熱宜疏利三黃丸積宜消積丸惟胸中活法治之小兒初生腹脹欲絶大小便不通急令婦人漱口吸咂兒胸前背心手足腹臍下共七處以紅赤色為度須臾自通附方消積丸見傷積症內三黃丸黃連黃芩大黃酒蒸曬九次等分為末蜜丸陰囊腫宜與疝症參看總括厥陰少陰寒激搏致令腫縮宜溫藥光浮不痛作虛醫赤腫須憑涼劑卻內經曰㿗癃疝膚脹者陰氣盛而脈脹不通也今小兒陰莖全縮不見有陰囊光腫不痛此因肝腎氣虛用橘仁煎湯調金鈴散或勻氣散觀內經之言乃陰氣盛而致此吊縮者筋急也筋遇寒則引縮遇熱則弛張故三因所用方法以寬小腸氣疏風為治然此乃坐陰潤之地感風濕而得用當歸散加檳榔蒼朮服或服鉤藤膏並以立消散敷之陰囊腫痛而引縮者蓋諸筋會於陰器邪客於厥陰少陰之經與冷氣相搏而成治之不早則成固疾如腰曲腹痛冷汗自出陰囊內二子吊縮入腹痛止方出名曰內吊用烏梅散勻氣散金鈴散為治有外腎無故而膚囊腫大不燥不痛光亮如燈此名氣虛所致亦用勻氣散調治一症外腎皮囊赤腫通明及女兒陰戶腫脹乃心熱所傳皆以木通散導赤散為治以朴硝散敷之批小兒七日腎縮乃初生受寒氣所致用硫磺茱萸各五錢研末大蒜調塗腹仍以蛇床子微煙燻之附方金鈴散三稜莪朮青皮陳皮赤茯茴香木香檳榔枳殼鉤藤金鈴子甘草勻氣散桔梗陳皮砂仁茴香殭蠶甘草當歸散見吐瀉症內鉤藤膏鉤藤玄胡索當歸乳香薄桂麝香甘草立消散赤小豆赤芍風化硝枳殼商陸各為末敷之乃以五苓散加車前子及米仁煎服烏梅散見腹痛症內木通散木通萹蓄大黃甘草山梔赤茯瞿麥滑石車前仁黃芩導赤散見五淋症內朴消散大黃牡礪朴硝為末水調敷小便閉附遺溺尿床總括膀胱不利稱邪熱清肺資源是所宜多尿遺溺為虛冷溫補收濕任所施脈法小便閉者其脈盛大而實者生虛澀而細者死內經曰膀胱不利為癃閉夫小便閉而不通者皆邪熱為病也分在氣在血而治之以渴與不渴而辨之如渴而小便不利者熱在上焦肺之分故渴而小便不利也夫小便者是足太陽膀胱經所主也長生於申申者西方金也肺金生水若肺中有熱不能生水是絶其水之源經云虛則補其母宜清肺而資其化源須用茯苓澤瀉琥珀燈心通草車前子木通瞿麥萹蓄之類以清肺氣瀉其火資水之上源也如不渴小便不通者熱在下焦血之分故不渴而大便燥小便不通也熱閉於下焦者腎也膀胱也乃陰中之陰陰受熱邪閉塞其流易老云寒在胸中則遏絶不入熱在下焦則填塞不便須用感北方寒水之化氣味俱陰之藥以除其熱泄其閉塞如黃柏知母肉桂之類以補腎與膀胱而資其化源若服淡滲之藥何能補重陰之不足哉夫用大苦寒之藥者治法當寒因熱用耳曾氏曰小便閉而不通有陰陽二症陰閉者為冷濕乘虛入里因而不通名曰陰閉以白芍藥湯加南木香及用炒鹽以絹包尉臍四圍並投五苓散入靈砂末溫鹽湯空心服陽閉者因暴熱所逼澀而不通名曰陽閉以五苓散加車前子燈心煎服及益元散木通散又癃閉與淋閉不同蓋癃者乃內臟氣虛受熱壅滯宣化不行非澀非痛但閉不通腹脹緊滿亦用五苓散加車前木通服或貼薑餅於臍上取效不拘陰陽二症悉能療之小兒初生無尿者因母食糟酒炙煿辛毒之物熱氣流於胎中兒因食血故生下肚脹膨臍腎腫如覺臍四旁有青黑色及撮口即不可救矣如無青黑色不飲乳者用蔥白頭寸大者分作四服用乳汁半小盞同煎片時分作四次服即通不飲乳服之即吃楊氏曰腎主水膀胱為之腑水滿膀胱通泄於小腸也然小腸應於心蓋陰不可無陽水不可無火水火既濟上下相交榮衛流行水道開合不失所司矣若心腎不濟陰陽不調故內外關膈而水道澀傳送失道則水道滑熱則不通冷則不禁其熱甚者小便閉而全無熱微者小便難而僅有腎與膀胱俱虛客熱乘之水道澀焉自令心氣旺甚小便壅遏用赤茯苓車前麥冬燈心之類清利之附方白芍藥湯見腹痛症內五苓散見驚風症內益元散見霍亂症內木通散見大便症內薑豉餅生薑一兩切細生蔥五根切碎淡豆豉七錢潤生鹽二錢生蒜七個切碎穿山甲五錢制酒麩糟一燈盞如無以好酒代用杵搗爛捻作餅子二寸間用微火烘熱帶熱貼臍上以絹兜住如冷依前法再以火烘暖亦好附遺溺尿床原病式曰遺尿不禁者為冷內經曰膀胱不約為遺溺仁齋曰小便者津液之餘也腎主水膀胱為津液之腑腎與膀胱俱虛而冷氣乘之故不能拘制其水出而不禁此謂遺尿睡里自出者謂之尿床此皆腎與膀胱虛而挾冷所致也以雞腸散主之然益智破故紙之類亦不可缺亦有熱客於腎部及膀胱火邪妄動水不得寧故不能禁而頻數來也治當補膀胱陰血瀉火邪為主而佐以收澀之劑如牡蠣山茱萸五味之類病本屬熱故宜瀉火因水不足故火動而致小便多小便既多水益虛故宜補血瀉火補血治其本也收之澀之治其標也附方雞腸散桂一錢五分龍骨二錢五分牡蠣煅灰茯苓桑螵蛸炒各五錢雞腸一具燒存性男用雌女用雄上為極細末仍以雞肫皮一具雞腸一具燒存性研為極細末每用前藥一錢以溫酒調化食前服又方雞肫皮一具雞腸一具燒豬胞炙焦男用雌女用雄為末酒調服麻木總括木本濕熱死血因手麻原屬氣家虛忽然十指麻木也濕痰死血胃中虛脈法脈浮而濡屬氣虛關前得之麻在上體關後得之麻在下體也脈浮而緩屬濕為麻痹脈緊而浮屬寒為痛痹脈澀而芤屬死血為木不知痛癢內經曰風寒濕三氣合而為痹故風氣勝為行痹寒氣勝者為痛痹濕氣勝者為著痹自批內經注雖合為痹發起亦殊也風則陽受之故為痹行寒則陰受之故為痹痛濕則皮肉筋受之故為皮著而不去也河間曰留著不去四肢麻木拘攣也岐伯曰痛者寒氣多也有寒故痛也其不痛不仁者病久入深榮衛之行濕經絡時疏故不痛皮膚不榮故不仁夫所謂不仁者或周身或四肢唧唧然麻木不知痛癢如繩扎縛初解之狀古方名為麻痹是也丹溪曰麻是氣虛木是濕痰死血然則曰麻曰木者以不仁中而分三也雖然亦有氣血俱虛但麻而不木者亦有虛而感濕麻木兼作者又有因虛而風寒濕三氣乘之故周身掣痛並麻木並作者古方謂之周痹治法宜先汗後補也然當以類推而治之不可執一見也如十指麻木是胃中有濕痰死血宜二陳湯加蒼朮桃仁紅花少加附子行經又宜四物湯加蒼朮白朮陳皮茯苓羌活紅花蘇木之類如手足俱麻木並指尖麻者皆痰滯經絡也宜二陳湯加竹瀝薑汁白芥子以祛痰火散風氣麻用補中益氣湯加當歸木香香附青皮川芎少加桂枝行經木用四物湯並二陳湯加桃仁紅花二方俱宜用竹瀝薑汁白芥子以行經至脅肋達痰之所在也附方二陳湯見諸吐症內四物湯見痢疾症內補中益氣湯見脫肛症內驚癱鶴膝總括風濕流傳骨節間痛兼心悸是驚癱若於腕脛多疼重凝結成團鶴膝看內經曰頑弱名緩風疼重名濕痹小兒驚癱者因驚風之際手腳動掣當聽其自然然後療之免生異症或父母見其病勢可畏從而按伏之豈知筋者肝之合也臨病發時若按束其手足則筋不舒伸遂至經絡為風所閉終為廢人又有四肢痿痹不仁致手足梢脹痛不堪忍者此風毒之氣使然故傳曰風淫末疾是也凡小兒心悸不常及遍身腫痛或手足不遂此為驚癱之候也若治之稍遲至臂腕膝脛骨節之間流結頑核或膝大而腫肉消骨露如鶴之膝狀或為癰為節此名鶴膝候也以上形症並宜發汗為先使腠理開通則氣熱可除有濕亦去用百解散和五苓散倍加麻黃微得汗為度次祛風散及獨活湯加桑寄生投服使風不生而痰不作愈矣若為癰為癤疼重者用黑牽牛半生半炒略研煎無灰酒調下五苓散以除流注之寒濕附方百解散見熱症內五苓散見驚風症內祛風散防風南星半夏黃芩甘草獨活湯當歸白朮黃耆薄桂牛膝獨活甘草諸瘡總括滿頭及額生如癩但用連床得安瘥通身糜爛更多煩一抹金塗無不快內經曰諸痛癢瘡皆屬於心火火鬱內發致有斯疾蓋心主乎血血熱生風熱鬱內甚遞相傳襲故火能生土血注陽明陽明主肌肉風熱與血熱相搏發見皮膚其名不一有黃膿而白者土生金母歸子也始生微癢而熱輕腫痛潰爛為熱極血凝化水氣滯成膿甚則寒熱作而飲食減此尤為可慮宜宣瀉風毒涼心經解胃熱用當歸散加黃連升麻乾葛薑蔥燈心煎服及牛蒡湯塗以四黃散一抹金若頭散生成片常常燥癢毛髮稀少有類白屑此因積熱上攻名曰禿瘡雖生於頭世人只知以藥外敷得愈不逾旬月其瘡又發何為而然蓋頭乃諸陽所會之處洪範五行火曰炎上熱毒上攻兩陽相灼故瘡生於頭法當解陳莝之積熱導心經之煩躁斯可矣宜百解散倍加五和湯薑蔥燈心煎服次以連床散塗之及四黃散亦可有遍身糜爛成片甚至煩躁衣不可著蓋風火內鬱於陽明流毒於外名曰風熱瘡用百解散加五和湯入何首烏荊芥白芷煎服及牛蒡湯疏滌腸胃解散風熱其瘡自愈不致再生外敷以四黃散及連麻散湯火瘡先用人參羌活散發表次以去霜膏塗之即效有小兒瘡瘍遍身頭上瘡蓋如餅此為胎氣熱毒所感宜以犀角解毒丸加減療之然最忌敷藥洗浴恐其入腹為患不淺至若瘡瘍作楚潮熱不止此雖系脾虛亦因肺氣受損先以理脾補虛然後復治其瘡瘍以當歸解毒湯治之附方當歸散見諸瀉症內牛蒡湯見淋症內四黃散黃連黃柏黃芩大黃滑石五倍子用香油調敷一抹金蘆薈蛇床黃丹水飛過各三錢硫磺赤石脂白礬火煅五倍黃柏各二錢半輕粉五分豬油或清油調百解散見熱症內五和湯當歸赤茯苓大黃枳殼甘草連床散黃連蛇床五倍輕粉用荊芥和蔥煮水候涼洗拭乾後即敷藥人參羌活散見傷寒症內玄霜膏用好糯米五升將堅硬鐵器盛貯見天處以雪水浸一二日不問腐爛仍取出於竹器內將水淋過曬乾焦炒研為末用新汲水調敷之如干燥又以雞毛蘸水拂瘡使瘡潤痛減藥少再塗用自然取效一名玄霜散炒透黑色煙青為度犀角解毒丸犀角黃連玄參桔梗連翹薄荷大力子當歸山梔甘草生地黃芩赤芍天花粉各一兩為末服當歸解毒湯陳皮當歸赤茯山楂黃柏知母柴胡人參金銀花丹毒總括小兒氣弱肌膚薄熱毒乘虛來發作急須退熱與消風毒散風消自安樂內經曰赤紫丹瘤皆心火內鬱而發赤如丹砂故名丹毒蓋心主血熱為血之媒謂應火而色赤也乃心家血熱盛以動之是以遊走遍體其乳母過食酒面煎炒之物或烘衣著兒不候冷而著亦成此疾自腹生出四肢者易治自四肢生入腹者難療當急令人隨患處遍吮毒血各聚一處砭出之急服解毒散加紫草茸外用白玉散敷之惟百日內忌砭以其肌肉難任也大抵治小兒丹毒必先服表藥內解熱毒方可塗散恐毒無所泄入里為患耳驚丹者小兒百日之內半歲以上忽兩眼胞紅暈微起面帶青黯色向夜煩啼或臉如胭脂此伏熱在內亦有臉不紅者始則居胎之時母受重驚邪傷胎氣遞相傳襲降生之後復受熱毒或再有驚有熱熱氣內蘊形之於外初時散生滿面狀如水痘腳微紅而不壯熱出沒休息無定次到頸項赤如丹砂名曰驚丹以四聖散先洗其目次用百解散以解驚熱丹毒甚則以四物湯加黃芩之類如驚丹發至胸膈乳間微有痰嗽作搐急宜宣熱拔毒免至內流為害不淺以五和湯加生地升麻燈心之類如此調治不生他症投萬安飲主之有身上發時亦如前症不甚燥癢但見出浮於遍體神昏不悅名陰濕毒症此二症不問赤白若入腹多致為害不可輕視為常耳砭法治丹毒色赤遊走不定令口吮毒血聚一處用細瓷器擊碎取有鋒者以箸頭劈開夾之用線縛定兩指輕撮箸稍令瓷芒在聚血處再用一箸頻擊刺出毒血輕者止用口吮出毒用藥敷之如患在頭者不用砭法止用針側臥挑患處以出毒血遲則入腹難起矣附方解毒散牛蒡子甘草荊芥防風犀角白玉散滑石寒水石各三錢五分四聖散黃連秦皮木賊燈心百解散見熱症內四物湯見痢疾症內五和湯見諸瘡症內萬安飲人參當歸黃耆防風柴胡枳殼半夏芍藥黃芩甘草狗癬疥方用松柏節劈開雞卵取油片席一塊如碗大剪洞一個如手大以松節放在洞邊將末香放在松節上取油風毒總括諸風夾熱隱皮膚凝結難為陡頓除項頰腫須護喉舌內疏風熱外宜塗內經曰榮氣不從逆於肉內乃生癰腫夫小兒風毒者因驚風之後風從氣行血從氣使毒氣蓄於皮膚流結而為腫毒遂結頑核赤色多成腮頰之間或耳根骨節之處重則成癰癤謂之遁毒風宜以當歸散倍加枳殼大黃或皂角刺薄荷之類如結在腮頰者治用烏豉膏含化以護咽喉外則敷以拂毒散若因跌僕損傷皮膚風邪侵襲患處面發腫者謂之破血傷風可投疏風散活血散之類夫瘰癧之症內經謂之結核究其所因丹溪所謂五味之厚鬱氣之積曰風曰熱與血相搏而結成者其始生於耳後頦下至項者此出足陽明胃經來也此曰瘰癧生於缺盆胸側或在兩脅者此出手足少陽經來也此曰馬刀俱當從其所因究治其小兒幼弱不堪針灸但以服餌塗貼之劑施之可也然須服引經之藥以除根本可獲全功耳此症服藥須當臥在床褥每日作十次咽服畢安臥蓋取藥力在膈上故也若發於喉下如帶橫纏者乃纏喉風也宜服化毒湯及烏豉膏含化以護咽喉外但依遁毒風治法如服藥後散止不定或上頭頂或遊面目而反復來喉下如赤紫微浮中有白突者陽症變陰亢則必害謂之赤遊風毒亦難治矣附方當歸散見諸瀉症內烏豉膏綿川烏水浸透去皮臍五錢炮製玄明粉二錢淡豉三錢水浸潤飯上蒸透杵爛為膏拂毒散半夏貝母大黃朴硝五倍上為末醋調敷疏風散荊芥防風甘草蔥湯調服活血散當歸川芎生地紅花赤芍蘇木升麻調經湯治陽明經升麻乾葛膽草黃芩黃柏歸尾桔梗連翹白芍知母黃連白朮三稜甘草稱一半為丸一半作蚊蛆稱五錢煎湯送下前丸連翹散柴胡連翹歸尾白芍生黃芩白朮天花粉膽草炙甘草三稜蒼朮黃連煎湯服法如前化毒湯桔梗薄荷荊芥甘草牙硝朴硝硼砂雄黃山豆根硃砂為細末每用一匙或五分乾點舌下或溫湯濃調少與含吞亦可夜啼總括夜啼四症驚為一無淚見燈心煩熱面目頰青臍下痛面黧大哭是神乾脈法虎口脈紋不見如雲塵色者是客忤鬼祟之脈必然夜啼盤腸氣發先腰曲無淚叫啼眼乾哭口開腳冷上唇烏額上汗流珠碌碌內經曰心藏神神安則臟和夫小兒晝得精神安夜則穩睡若心熱驚熱或風寒之邪乘之則精神不得安定故致夜啼叫不已也心熱者見燈愈啼面紅多淚無燈則稍息蓋火者陽物也心熱遇火兩陽相搏才有燈而啼甚故經曰火痰風生乃能兩此其義也宜涼心安神用三解散見驚風去參用薄荷湯下驚熱者為衣衾太厚或抱於熱處久坐致生煩悶邪熱攻心心藏神神安則和神亂則驚治法退熱鎮心則自安矣用牛蒡散抱龍丸有遇黃昏後至更盡時哭多啼少有啼聲不已直到天明乃胎中受寒遇夜則陰勝而陽微故腰曲額汗眼中無淚面瑩白而頰青伏臥而啼入盤腸內吊之症名曰寒疝治法去宿冷溫下焦白芍藥湯及鉤藤丸誤觸禁忌而夜啼者面色紫黑氣鬱如怒呼時若有恐懼及睡中驚惕兩手抱母大哭不休此誤觸惡祟神祗目有所睹口不能言故耳古云忽然兩手形無見定知唐突惡神明乃知此症者宜兩指紋俱隱而不見治法先解表用百解散次驅邪鎮心用蘇合香丸抱龍丸啼與哭亦有別啼而不哭是痛故直聲來往而無淚哭而不啼是驚故連聲不絶而多淚又曰啼而不哭者是煩哭而不啼者為燥面青目白腰曲而啼捫腹覺冷此必感寒肚疼也面赤心躁小便赤澀口中及腹俱熱間或有汗仰身而啼此熱症也又有乳到兒口即啼身體頭額皆熱須看口內無瘡必然喉舌腫痛附方牛蒡湯見淋症內抱龍丸見驚風症內白芍藥湯見腹痛症內加鉤藤亦好鉤藤丸見囊腫症內百解散見熱症內蘇合香丸白朮烏犀香附硃砂訶子檀香安息沉香麝香丁香青木香蘇木香蘇合油薰木香為末蜜丸梧桐子大瘖症總括失音之症古名瘖大抵多因病後成補瀉隨時加減用地黃丸服有音聲內經曰舌者音之機也喉者音之關也小兒卒然無音乃寒氣客於會厭則厭不能發發不能出致其門闔不啓故無音也若咽喉音聲如故而舌不能運轉言語則為舌瘖此乃風冷之邪克於皮之絡或中於舌下廉泉穴所致蓋舌乃心之苗心發聲為言風邪阻塞其經絡故舌不能轉運也若舌本不能轉運言語而喉中聲嘶者則為喉瘖此亦為風冷所客使氣道不通故聲不得發而喉無音也然或因風痰阻塞或因心經氣虛或因脾之絡受風或因風痰滯於脾之絡或因脾氣不足或胃中清氣不升皆足以致瘖大抵此症有稟父腎氣不足不能言者有乳母五志之火遺兒熏閉清道不能言者或兒病津液耗損會厭乾涸不能言者或腎氣不充虛火上炎傷肺不能言者有驚風中風不能言者若遺熱於津液耗者用七味白朮散清氣不升者用補中益氣湯稟腎不足與虛火傷肺者用六味地黃丸若仰首咳嗽肢體羸瘦目白睛多或兼解顱呵欠咬牙等症悉屬腎虛非地黃丸不能救也若患吐瀉或大病後雖有聲而不能言又能咽物有不能咽者非失音此腎怯不能上接於陽也當以參朮溫補之劑主之保嬰集云小兒五六歲心氣不足而不能言用菖蒲丸口噤不能言者用地黃丸三十二問解顱仲陽謂生下囟不合腎氣衰也長必少笑更有目白睛多㿠白身瘦者多愁少喜也余見腎虛症楊氏曰小兒年大頭縫開解而不合者腎主髓腦為髓海腎氣有虧腦髓不足所以頭顱開而不能合也人乏腦髓如木無根凡得此者不遠千日亦有數歲乃成廢人故有此症亦不可束手待死也宜與錢氏地黃丸仍用天南星微炮為末米醋調敷於緋帛烘熱貼之亦良法也三十三問囟陷囟填囟陷者始因臟腑有熱渴飲水漿致成泄瀉久則血氣虛損不能上衝腦髓故囟陷如坑不能平滿用狗頭骨炙黃為末雞子清調敷之囟填者囟門腫起也脾主肌肉乳哺不常飢飽無度或寒或熱乘於脾家致使臟腑不調其氣上衝為之填脹囟突而高如物堆起毛髮短黃自汗是也若寒氣上衝則牢靳熱氣上衝則柔軟寒者溫之熱者涼之劑量輕重兼與調氣小兒肝盛風熱交攻亦然此症未易退瘥或熱症用大連翹散主之有表熱症柴胡散主之又有封囟散掩之論曰小兒胃和沖和則腦髓充盛囟頂漸合若胃熱熏蒸臟腑則渴而引飲因致泄利今臟腑壅熱血氣虛弱不能上衝腦髓所以囟陷也用當歸散地黃丸齒遲語遲行遲齒遲者腎氣不足語遲者心氣不足行遲者稟受不足天柱骨倒項軟者胎氣不足大病後後項軟即天柱骨倒也或吐瀉之餘傷寒失表脾受風熱者速與祛風追熱及以強筋之劑小兒肌體雄壯不為瘦瘁忽然項軟傾倒此名下竄皆因肝腎氣虛客邪侵入臟腑傳於筋骨故成此疾蓋肝主乎筋腎主乎骨筋骨俱弱則項軟垂下無力亦名天柱骨倒與五軟相類不過調元散補腎地黃丸附方七味白朮散人參白朮茯苓藿香木香乾葛甘草補中益氣湯見脫肛症內六味地黃丸菖蒲丸治心氣不足不能言語石菖蒲赤石脂各三錢人參五錢丹參二錢天冬麥門冬各一兩連翹散見風毒症內柴胡散封囟散人參二錢甘草二錢門冬二錢膽草一錢酒炒防風一錢柴胡五分當歸散見諸瀉症內地黃丸調元散人參茯苓茯神白朮白芍熟地當歸黃耆川芎石菖蒲山藥甘草補腎地黃丸見五淋症內胃氣虛寒總括胃冷皆因稟賦虛或因大病久成之急須溫補扶元氣免得尫羸請藥師內經曰胃為水穀之海六腑之大源也人身氣血臟腑俱由胃氣而生故東垣之法一以脾胃為主所謂補腎不若補脾是也在小兒雖得乳食然水穀之氣未全猶仗胃氣胃氣一虛則四臟俱失所養矣故丹溪謂小兒多脾胃之疾也若面色㿠白目無睛光口中氣冷不食吐水肌瘦腹痛此胃氣虛寒之症也用五味異功散主之若大便不實兼脾虛也加乾薑溫之中滿不利脾不運也加木香開之命門火衰不能生土者用八味地黃丸補之稟賦胃氣不足亦用此丸蓋下焦真陽充盛則上升脾元自然溫蒸水穀矣內經所謂益火之源以消陰翳正此藥也附方五味異功散見驚風症內去木香八味地黃丸即六味地黃丸加肉桂附子各一兩小兒初生諸症附小兒五軟總括胎熱三朝旬外月餘兒目閉胞浮症可推常作呻吟煩躁起此為胎熱定無疑胎寒孩兒百日胎寒候足曲難伸兩手拳口冷腹膨身戰栗晝啼不已夜滋煎胎黃小兒生下胎黃症母感熱毒傳而成急服地黃犀角散黃退身冷命可生胎驚胎驚亦是胎中得産婦乖常調理失面澤目光可生也眉間黑色真太急臍風臍風早受入臍中七日之間驗吉凶若見腹疼臍突起惡聲口撮是為風臍突嬰兒生下旬餘日臍突光浮非大疾穢水停中明所因徐徐用藥令消釋臟寒手兼足冷麵微青腹痛腸鳴泄瀉頻蓋為生時感寒濕夜多啼切日常輕黃帝曰若我不能察其幼小者夫生知之聖猶曰難之何哉蓋芽兒初生骨肉未堅五臟未充正如水上之泡草頭之露耳初生七日之內天地八風之邪豈能速害良由在胎之時母失愛護或勞動氣血飢飽失時冷熱相制憂愁驚怖以致損傷胎氣故降生之後便有胎熱胎寒胎驚者諸病生焉外因浴洗拭口斷臍炙囟之不得法或抱持驚恐乳哺寒溫之失宜致令噤口臍風鎖肚不乳等症病患致此亦難療矣故黃帝猶曰難之謂別是一家調理耳吾輩當明生死形候察藥性之寒溫探病患之深淺小心治之慎勿謂七日之內所患不治而輕棄之也胎熱者小兒降生之後痰涎氣急眼閉目赤眼胞浮腫神困呵欠厄厄作聲遍體作熱小便赤大便不通時復驚煩此因胎中受熱誤服溫劑致令熱蓄於內薰蒸胎氣故有此症宜先以木通散與母服小兒服地黃膏不可用涼藥攻之以致他病乳母並忌辛辣酒面胎寒者初生百日內覺口冷腹痛身起寒栗時發栗戰曲足握拳晝夜啼哭或口噤不開名曰胎寒或産母喜啖生冷瓜果或胎前外感風寒暑濕過服涼藥內傷胎氣致兒生後昏昏多睡間或吮乳瀉白宜當歸散定其痛白朮散養其胃芍藥湯去寒濕乳母宜忌口胎黃者生下遍體面目皆黃狀如金色大便不通小便如血此胎黃也亦因其母受熱而傳於胎一有此症母子皆宜服地黃湯有生下百日及半周不因病而身黃者此胃熱也若自生而身黃者胎疸也經云諸疸皆熱色深黃是也犀角散主之若淡黃兼白者此胃怯也白朮散主之胎驚者因胎婦調攝乖常母有所觸胎必感之其候日內溫肚翻眼握拳噤口咬牙身腰強直涎沫嘔吐搐掣驚啼或頰赤面青眼合凡胎風眼合不可誤作慢脾妄用溫藥眉間黑黯者不治以豬乳細研牛黃麝香各少許調抹入口即愈矣鎖肛者由胎中受熱熱毒壅盛結於肛門閉而不通無復滋潤所以如此若第三日不通急令婦人漱口吸咂兒前後心並臍下手足心共七處凡四五次仍以輕粉五分蜜少許溫水化開時服少許以通為度如又不通即是肛門內合當以金簪或玉簪刺入肛門二寸許以蘇合丸少許納入孔中糞出為快也若腹膨脹不能乳食作呻吟聲一至七日可保生也臍風者因斷臍之後被風寒水濕之氣入於臍流於脾遂令肚腹脹滿臍腫身體重著四肢柔直日夜多啼不能吮乳甚則發為風搐臍邊青黑撮口不開關為內搐爪甲黑者即死宜千金龍膽湯主之臍突一症非臍風也蓋因洗浴系臍不緊穢水侵入於內生後旬日外臍忽光得如吹捻動微響或夜臥驚啼急用大黃牡蠣各半兩焙為末再以朴硝勻均用田螺浸水調或一錢或二錢塗腫處即消批小兒初生遍身無皮是紅肉用米炒為細粉干撲候生皮止又有身如魚泡如水晶碎則成水流滲用蜜陀僧研細羅底拍取細者干撲臟寒一症頗類胎寒但手足稍冷唇面微青額汗不乳至夜多啼腹瀉青水只無口冷戰栗之異用藥與胎寒同撮口者由胎氣挾熱風邪入臍流毒心脾之經故令舌弱唇青聚口撮面飲食不進若口出白沫而四肢冷者不可救藥其或肚脹青筋吊腸卵疝內氣引痛皆腸胃鬱結不通致之治法貴乎疏利撮口最為急候七日之內見之尤甚以辰砂膏利之或用撮風散撮風者眼禁口開啼聲漸少舌上聚肉如粟米狀吮乳不得口吐白沫大小便皆通自滿月至一百二十日見此名曰犯風噤依法將護防於未然但有此症急看兒上齶有點子先以指甲刮破次用辰砂全蠍散之類如口噤不開服諸藥不效有用生南星去皮臍研為極細末龍腦少許合和用指蘸生薑汁於大牙根上擦之立開凡臍風撮口噤風三者雖異而受病之源則一也大抵裡氣鬱結壅閉不通並宜服淡豉汁與吃取下胎毒千金方云小兒初生其病高盛若有微患即須下之若不與下則成大疾難為療矣以紫霜丸量而與之附方木通散見囊腫症內去萹蓄地黃膏山梔仁一兩五錢緑豆粉一兩五錢粉草六錢生地一兩五錢加蜜一兩半二味同放瓷器內煎成膏入前藥為丸麥冬湯下當歸散當歸薄桂川芎薑甘草木通香附乳汁調下白朮散見熱症加山藥白芍湯見腹痛症加鉤藤地黃湯天花粉生地茵陳赤芍赤茯苓甘草豬苓澤瀉當歸犀角散犀角茵陳升麻生地膽草寒水石天花粉甘草千金龍膽湯膽草鉤藤柴胡黃芩蜣螂去翅足甘草芍藥茯苓桔梗黃連辰砂膏馬牙硝辰砂硼砂全蠍玄明粉麝香真珠共為末用黑棗肉成膏每服一豆許驚用金銀薄荷潮熱用甘草湯月內兒以乳汁調敷乳上吮下撮風散赤腳蜈蚣一條去口炙黃色硃砂殭蠶蠍尾各一錢麝香少許為末竹瀝調下一匙凡臍風撮口噤口俱治紫霜丸代赭石赤石脂巴霜杏仁消乳丸砂仁陳皮三稜莪朮神麯麥芽香附附小兒五軟軟者胎氣不固精髓不充為六淫所襲也頭頂軟者腎虛所致也或因吐瀉脾弱而得脾胃為主六君子加肉桂炮薑風邪侵入祛風為主手軟者兩手筋縮不能屈伸薏苡仁當歸秦艽棗仁防風羌活荊芥為末芡實湯下腳軟者骨髓不滿氣血不足筋弱不能束骨而行也宜地黃丸加牛膝虎骨鹿茸五加皮為主身軟者肉少皮寬飲食不為肌膚補脾主之口軟者心神不足故不能言語也人參石菖蒲麥冬遠志川芎當歸各二錢乳香硃砂各一錢蜜丸又有稟氣不足而蕊不生者宜補腎丸或十全大補湯加知母黃柏主之附方六君子湯見瘧疾症內補腎地黃丸見五淋症內十全大補湯當歸川芎生地白芍人參白朮茯苓甘草黃耆肉桂肥兒丸蒼朮一兩米泔浸炒厚朴一兩薑汁炒山楂肉一兩黃連一兩薑汁炒陳皮一兩去白甘草五錢炙神麯一兩炒麥芽一兩白朮八錢炒山藥一兩半夏一兩制木香六錢砂仁六錢炒蓮肉二兩去心胡黃連五錢銀柴胡五錢白茯苓一兩使君子肉一兩上為末蜜丸如緑豆大陳皮湯服四味丸白朮茯苓胡黃連蘆薈脈法錢仲陽曰小兒之脈氣不和則弦急傷食則沉緩虛驚則促急風則浮冷則沉細脈亂則不治水鏡訣云陰陽運合男女成形已分九竊四肢乃生五臟六腑部分既別逆順難明若憑寸口之浮沉必乃橫亡於孩子須明虎口別看三關審詳用藥始無差誤未至三歲看虎口食指第一節名風關脈見初病易治第二節名氣關脈見病深難治第三節名命關脈見死不治三關青是四足驚赤是水驚黑是人驚紫色瀉痢黃色雷驚三關通度是極驚之症必死或青或紅有紋口線一直者是乳食傷脾必發驚熱左右一樣者是驚與積發齊有三條或散是肺生風痰或是齁䶎聲有赤是傷寒及嗽如紅火是瀉紅黑相兼主下痢黑青多白痢赤痢紅色紫色相兼加口渴虎口脈紋亂主胃氣不和青是驚與積青黑髮慢驚脈入掌乃內釣指紋曲里風盛彎外食積此論三歲以上之法若三歲以下更用一指按高骨乃分三關定其息數呼吸七八至為平脈九至不安十至危因浮主風沉遲主虛寒實主有熱緊主癲癇洪主熱盛沉緩主虛瀉微遲有積有蟲遲澀主胃脘不和沉主乳食難化沉細主乳積停滯緊弦主腹中熱痛牢實主大便閉結沉而數者骨中有熱弦長是肝肺有風緊數乃驚風為患四肢掣顫浮洪乃胃口有熱沉緊主腹痛有寒虛澀者有氣又主慢驚芤主大便利血四歲以下用一指滾轉尋三部以關為準七八歲移指少許九歲次第依三關部位尋取十一十二歲亦同十四十五歲依大方脈部位診視凡看脈先定浮沉遲數陰陽冷熱沉里遲寒為陰浮表數熱為陽更兼看部位青主驚風白主虛瀉赤主痰熱黑色病深黃主脾疳以此相參察療治庶無誤也批以下形脈不可專執以此投劑然亦不可不知故附諸名以下俱參辨脈形治也流珠形批流珠形只一點紅色在食指風關之側主飲食所傷內熱欲吐或腸鳴自利煩躁啼哭用助胃膏消飲食分陰陽若消食而病仍作用香砂助胃膏以補其脾胃環珠形批環珠形比流珠形大主脾虛停食胸膈脹滿煩渴發熱用五味異功散加山楂枳實健脾消食後用六君子湯調養中氣長珠形批長珠形圓長以上非謂圈子總皆紅脈貫氣如此主脾傷飲食積滯肚腹作痛寒熱不食先用大安丸消其積滯次用異功散健其脾氣來蛇形批來蛇形即是長珠形散一頭大一頭尖主脾胃脾濕熱中脘不利乾嘔不食此疳邪內作先用四味肥兒丸治疳後用四君子湯補脾去蛇形批去蛇亦如此分上下朝故曰來蛇去蛇主脾虛食積吐瀉煩渴氣短喘急不食困倦先用六君子湯加枳實健脾消積次以七味白朮散調補胃氣弓反里形批角弓反張向里為順向外為逆主感冒寒邪哽氣出氣驚悸困倦四肢梢冷小便赤色咳嗽吐涎先用惺惺散助胃氣祛外邪後以五味異功散加茯神當歸養心血助胃氣若外邪既解而驚悸指冷脾氣受損也宜用七味白朮散補之若悶亂氣粗喘促哽氣者難治脾虛甚故也弓反外形主痰熱心神恍惚夾驚夾食風癇痰盛先以天麻防風丸祛外邪又用五味異功散調中氣鎗形批鎗形直上主風熱生痰發搐先用抱龍丸如未應用牛黃清心丸若傳於脾肺或過用風痰之藥而見一切諸症者專調補脾胃魚骨形批魚骨分開主驚痰發熱先用抱龍丸治之如未應屬肝火實熱少用抑青丸以清肝隨用六味丸以補肝或發熱少食或痰盛發搐乃肝木克脾土用六君子湯加柴胡補脾土以制肝木水字形批水字形即三脈並見主風驚食積胸膈煩躁頓悶少食或夜啼痰盛口噤搐搦此脾胃虛弱飲食積滯而木剋土也先用大安丸消導飲食次以六君鉤藤補中清肝若已服消導化痰等劑而病不愈者用四君升麻柴胡鉤藤升補脾氣平制肝木針形批針形即過關一二米許主心肝熱極生風驚悸煩悶困倦不食痰盛搐搦先用抱龍丸祛風化痰次用六君子湯鉤藤平肝實脾透關射指形批透指命脈曲里主驚風痰熱聚於胸膈乃脾肺虧損痰邪乘聚先用牛黃清心丸清脾肺化痰涎次用六君子湯加桔梗山藥補脾土益肺金透關射甲形批射甲命脈向外主驚風肝木剋制脾土之敗症急用六君木香鉤藤官桂溫補脾土未應即加附子以回陽氣多得生者嘗聞古人云小兒為芽兒如草之芽水之泡蓋因臟腑脆嫩口不能言最難投劑當首視面色而知其屬次驗虎口以辨其因實為治法之簡要也虎口脈紋歌小兒食積辨三關男左女右一般看要知初氣中風候末是命門易亦難要知虎口氣紋脈到指看形分五色黃紅安樂五臟和紅紫依稀有損益紫青傷食氣虛損青黑之時症候極忽然純黑在其間好手醫人心膽寒指紋深青主驚悸青亦相半急驚看青而深紫神形縮來去不定慢驚干紫黑青紋或隱隱似出不出慢脾端淺青之色腹中痛青黑內吊驚搐開淡紅下痢或吐瀉腹痛不食病尤難深紫驚哭紅驚熱赤紅相半是傷寒淺紫煩渴或吐痢紋彎傷乳病相干彎紋入里順且可出外透甲絶脈看風關魚刺驚青治氣主疳勞熱易痊命關青主虛風治風入脾兼肺主難風見懸針主水驚氣關疳亦肺煩生命關一見未可治紫紅微微如是輕風關水是驚入肺咳嗽生痰潮熱生氣見涎痰積不化命驚疳積哭亦傾乙字風關肝受驚氣關亦主受驚侵命關若是慢脾病總是靈丹命不存風見蛔蟲疳積聚小便閉結腹虛膨氣關作渴主瀉痢命若逄之定見傾環形風見肝疳積氣見須知吐逆侵病久定因疳入胃命關若見死無生一見流珠膈熱多三焦不慢瀉頻過煩躁哭啼時欲吐腸鳴自利可調和來蛇中脘不調和積氣攻攢乾嘔多若見去蛇時瀉痢脾虛飲食不消磨弓反里形頭目重寒邪驚里小便黃四肢倦怠兼相冷逐冷疏風便得康弓反外形痰熱病夾驚夾食及風癇心神驚悸神志倦用藥寧心便得痊紫熱紅傷寒青驚白色疳黑時因中惡黃即困脾端半歲以下於額前眉端髮際之間以無名指三指候之兒頭在左舉右手兒頭在右舉左手食指在上中指在中無名指在下三指熱外感風鼻塞咳嗽三指冷外感寒內傷飲食發熱吐瀉食中熱主上熱下冷中指熱主夾驚食指熱主食滯附方助胃膏木香乾薑炙草山藥蓮肉白朮茯苓肉果訶子神麯麥芽人參砂仁丁皮白蔻為末蜜丸如芡實大五味異功散見驚風症六君子湯見瘧症大安丸見滯頤症四味丸見五軟症四君子湯見驚風症七味白朮散見瘖症惺惺散見諸吐症天麻防風丸天麻防風半夏川芎蘆薈青黛黃連五靈蟬蛻全蠍麝香夜明砂抱龍丸見驚風症牛黃清心丸見滯頤症內抑青丸黃連吳茱萸湯浸一宿為末水泛為丸大瀉肝火治左脅作痛脈要論男子不可久瀉女子不可久吐左手屬陽右手屬陰也關前屬陽關後屬陰也汗多亡陽下多亡陰諸陰為寒諸陽為熱人迎者左手關前一分是也氣口者右手關前一分是也人迎以候天之六氣風寒暑濕燥火之外感也人迎浮盛則為傷風也緊盛則傷寒也洪大則傷暑也沉細則傷濕也虛數則傷熱也氣口以候人之七情喜怒憂思悲恐驚之內傷也喜者脈散也怒者脈激也憂者脈澀也思者脈結也悲者脈緊也恐者脈沉也驚者脈動也人迎脈緊盛大於氣口一倍為外感風與寒皆屬於表為陽也腑也氣口脈緊盛大於人迎一倍為傷食為勞倦皆屬於里為陰也臟也人迎氣口俱緊盛此為夾食傷寒為內傷外感也男子久病氣口充於人迎者有胃氣也女子久病人迎充於氣口者有胃氣也病雖重可治反此則逆外因者六淫之邪也內因者七情之氣也不內外因者飲食勞倦跌僕也六脈者浮沉遲數滑澀也浮者為陽在表為風為虛也沉者為陰在裡為濕為實也遲者在臟為寒為冷為陰也數者為熱為燥為陽在腑也滑者血多氣少也澀者氣多血少也澀為氣遏滯中風宜浮遲忌急實也傷寒宜洪大忌沉細也咳嗽宜浮澀忌沉伏也腹脹宜浮大忌虛小也下痢宜虛小忌浮洪也狂疾宜實大忌沉細也霍亂宜洪大忌微遲也消渴宜數大忌虛小也水氣宜洪大忌沉細也鼻衄宜沉細忌浮大也腹疼痛宜沉細忌浮大也上氣浮腫宜浮滑忌微細也頭痛宜浮長忌短澀也喘急宜浮滑忌脈澀也吐血宜沉弱忌實大也金瘡宜微細忌緊數也中惡宜緊細忌浮大也中毒宜數大忌微細也腸癖宜沉遲忌急疾也內傷宜弦忌小弱也風痹宜虛濡忌緊急也溫病發熱忌微小也腹中有積忌虛弱也病熱忌脈靜也病泄忌脈大也翻胃宜浮緩忌沉濡也咳逆宜浮緩忌弦急也諸氣宜浮緊忌虛弱也痞滿宜滑脈忌澀脈也婦人帶下宜遲滑忌虛浮也婦人妊娠宜洪大忌沉細也勞怯宜小緩忌弦數也産婦面赤舌青母活子死也面青舌赤母死子活也面舌俱青口唇沫出子母俱死也婦人已産宜小實忌虛浮也婦人虛勞右寸數者危也魚口氣急者死也循衣摸床者死也口臭不可近者死也舌卷卵縮者死也眼目直視者死也面無光牙根黑者死也汗出身體不涼者死也頭面痛卒視無見者死也黑色入耳目鼻漸入口者死也溫病大熱脈細小者死溫病汗出不足者死也瘦脫形發熱脈堅急者死也人病脈不病者名內為虛也脈病人不病者名行尸也若閉目不欲見人宜弦急而長忌浮短而澀也病若開目而渴心下悸者宜緊實而數忌浮澀而微也病若譫言妄語身嘗有熱脈宜洪大忌手足厥冷脈細而微也傷寒舌黑者死也久病汗出不收者死也小兒哺乳宜慎擇論夫初生小兒藉乳為命其哺乳之法不可不慎批不特乳要慎而小兒乳母亦要留心凡乳母稟賦之厚薄性情之緩急骨相之堅脆德性之善惡兒能連背大為關係不知漸染既久識性不問猶如接木之造化然也故亦不可不擇信哉蓋乳者榮血之所化也故乳母尤宜謹節飲食下咽乳汁便通情欲動中乳汁便應病氣到乳汁必凝滯兒得此乳疾病立至不吐則瀉不瘡則癤或為口糜或為驚搐或為夜啼或為腹痛病之初來其溺必甚少便須詢問端的隨症調治母安則子安可消患於未形也故乳母夏不欲熱熱則致吐逆冬不欲寒寒則致咳痢母不欲怒怒則上氣癲狂母不欲醉醉則令身熱腹痛母方吐下而乳則致虛羸母有積熱而乳則變黃不能食新房而乳則瘦脊交頸不能行新浴而乳則發吐哯神困傷熱乳則瀉黃傷冷乳則瀉青冷熱不調停積胸膈結為痰飲遂成壯熱壯熱不已乃成驚癇兒啼未定遽以乳哺氣逆不消因成乳癖懷妊而乳至令黃瘦腹大腳弱名曰鬾病大抵哺乳不可太飽故俗云若要小兒安須帶三分飢與寒是也護養法巢氏曰小兒初生肌膚未實宜用舊絮護其背不可太暖更宜數見風日則血氣剛強肌肉緻密若藏於重幃密室或厚衣過暖則筋骨軟脆不任風寒多易致病衣服當隨寒熱加減但令背暖為佳亦勿令出汗恐表虛風邪易傷哺乳亦不宜過飽若宿滯不化用消乳丸治之陳氏所謂忍三分寒吃七分飽頻揉肚少洗浴要肚暖頭涼皆至論也須令乳母預慎七情六淫厚味炙煿則乳汁清寧兒不致疾否則陰陽偏勝氣血沸騰乳汁敗壞必生諸症若屢用藥餌則臟腑陰損多變敗症可不慎歟大抵保嬰之法未病則調治乳母既病則審治孩兒亦必兼治其母為善附方消乳丸見初生諸症內變蒸巢氏曰小兒變蒸者以長氣血也變者上氣蒸者體熱仲陽曰變者易也又云變蒸者自內而長自下而上又身熱故每變畢即覺性情有異於前何者長生臟腑意智故也何謂三十二日長骨肉添精神人有三百六十五骨以象天數以應期歲以分十二經絡自初生至三十二日一變生癸屬足少陰經腎藏精與志六十四日二變一蒸生壬屬太陽經膀胱腑其發耳與骫冷腎與膀胱合俱主於水地六成之至九十六日三變生丁屬手少陰經心藏神其性為喜至一百二十八日四變二蒸生丙屬手太陽經小腸腑其發汗出而微驚心與小腸合為火地二生火天七成之至一百六十日五變生乙屬足厥陰經肝藏魂喜哭至一百九十二六變三蒸生甲屬足少陽經膽腑其發目不閉而赤肝與膽合主木天三生木地八成之至二百二十四日七變生辛屬手太陰經肺藏魄至二百五十六日八變四蒸生庚屬手陽明經大腸腑其髮膚熱而汗或不汗肺與大腸合生金地四生金天九成之至二百八十八日九變生己屬太陰經脾藏意與智至三百二十日十變五蒸生戊屬足陽明經胃腑其發不食腹痛而吐乳脾與胃主土天五生土地十成之又手厥陰經心包絡為臟手少陽三焦為腑此一臟一腑俱無狀故不變而不蒸也前十變五蒸乃天地之數以生成之此後如生齒能言知喜怒故云始全也太倉云氣入四肢長碎骨於十變設六十四日為一大蒸計三百八十四日長其經脈手受血故能持物足受血故能行立經云變且蒸謂蒸畢而足一歲之日有餘也師曰不汗而熱者發其汗大吐者微止不可別治又六十四日為二大蒸計四百四十八日又六十四日為三大蒸計五百十二日至五百七十六日變蒸既畢兒乃成人也變者生五臟也蒸者養六腑也變蒸者上氣蒸者體熱每經一變一蒸情態即異輕者發熱微汗其狀似驚重則壯熱脈亂而數或汗或吐或煩啼燥渴輕者五六日解重者七八日解其候與傷寒相似亦有變蒸之餘續感寒邪者但變蒸則耳冷骫冷上唇發泡如濁珠若寒邪搏之則寒熱交爭腹中作痛而啼叫之聲日夜不絶變者易也蒸於肝則目眩微赤蒸於肺則嚏嗽毛聳凡五臟六腑筋脈骨節循環各有證應其治法平和者微表之實熱者微利之可服紫丸黑散柴胡湯有汗無熱並吐瀉不乳多啼者當歸散調氣散主之變蒸之外小兒體貌情態自然平和大抵人得中和之道以為純粹陰陽所得剛柔兼濟氣血和而百脈順所以心智益通精神俱備臟腑充實形體固壯齒細發黑聲洪睡穩此乃受氣充之稟性得中而無疾耳前症蓋小兒所不免者雖無藥亦可也前藥峻厲非惟臟腑不勝抑且反傷氣血余嘗見一小兒至一變發熱有痰投抱龍丸一粒卒至不救觀此可驗慎之慎之其有不熱不驚略無症候而暗變者蓋受胎氣壯實故也附方紫丸即紫霜丸見小兒初生諸疾黑散麻黃大黃杏仁柴胡湯人參三錢甘草二錢門冬二錢膽草一錢酒炒防風一錢柴胡五分當歸散見諸瀉症內調氣散木香香附人參陳皮火香甘草五臟虛實所主論錢氏曰心主驚實則叫哭發熱飲水而搐虛則困臥悸動不安心痛多叫手足動搖驚悸心氣熱則心胸亦熱欲言不能而有就涼之意故合面臥心熱視其睡口中氣溫或合面而睡及上竄搖頭咬牙皆心熱也導赤散主之心實則氣上下滯合臥則氣不通故喜仰臥則氣得上下通也瀉心湯主之肝主風實則目直大叫呵欠項急煩悶虛則咬牙呵欠氣熱則外生風氣溫則內生風肝熱則手尋衣領及亂捻物肝有風則目連扎不搐得心熱則搐治肝瀉清丸治心導赤散肝熱甚目反強直而搐治與有風同凡病或新或久皆引肝風風動而主於頭目連扎也若熱入目牽其筋脈兩眥俱緊不能轉視故目直也若得心熱則搐以其子母俱有實熱風火相搏故也潔古云肝主謀勇熱則尋衣捻物目連扎直視不能轉視或極則身反強直皆實熱也目者肝之竅肝屬木木性急故如此錢氏曰脾主困病則困睡身熱飲水虛則吐瀉生風肺主喘實則悶亂喘促有飲水者有不飲水者虛則哽氣長出氣肺熱手掐眉目鼻面肺盛復有風冷胸滿短氣氣急則喘嗽上氣當先散肺熱後散風冷肺只傷寒則不胸滿肺熱唇深紅色治之散虛熱肺臟怯唇白色當補若悶亂氣粗喘促哽氣者難治肺虛損故也脾肺病久則虛而唇白脾者肺之母母子皆虛不能相營故曰怯肺主唇唇白而澤者吉如枯骨者死潔古云肺主氣溫則壯熱飲水喘悶鼻乾燥手捫眉面瀉白散主之胸滿短氣氣急喘嗽上氣皆是肺氣有餘復感風邪之所傷謂之微邪先瀉而後發散之錢氏曰腎主虛無實也惟瘡疹腎實則黑陷腎虛兒本虛怯由胎氣不成則神不足目中白睛多其囟即解自開也面色㿠白此皆難養不過八八之數若恣色欲多不及四旬而亡或有因病而致腎虛者非也又腎氣不足則下竄蓋骨重惟欲下墜而縮身也腎水陰也腎虛則畏明宜補之潔古云下竄者腎氣不足兩足熱不喜衣覆足然此者臍以下皆腎之所主緣心氣下行於腎部也此乃腎不足而心有餘宜地黃丸主之附方導赤散見五淋症內瀉心湯見熱症內瀉青丸見驚風症內瀉白散見咳嗽症內五臟相勝之邪論錢氏曰肝臟病見秋木旺肝強勝肺也宜補肺瀉肝輕則肝病退重者唇白而死肺病見春金旺肺強勝肝當瀉肺輕者肺病退重者目淡青必發驚更有赤者發搐為肝怯當目淡青也心病見冬火旺心強勝腎當補腎瀉心輕者心病退重者下竄不語腎氣怯也腎病見夏水勝火腎勝心也宜瀉腎輕者腎病退重者悸動當搐也脾病見四時皆仿此治之順者易治逆者難治脾怯面目赤黃五臟相反當隨症治之一肺病又見肝症咬牙多呵欠者易治肝虛不勝肺故也若目直大叫哭項急煩悶者難治蓋肺病久則虛冷肝強實而反勝肺視病之邪久虛實虛則補母實則瀉子斯得之矣潔古云肝勝肺則肝病身熱發搐又見肺虛喘而氣短病見於申酉戌時是肝真強也內經曰受所制而不能制謂之真強法當補脾肺而瀉肝導赤散瀉黃散主之按劉宗厚云此皆五臟相勝病機不離五行生剋制化之理蓋小兒初生襁褓未有七情六欲只是形體脆弱血氣未定臟腑精神未完所以有臟氣虛實勝乘之病但世俗不審此理往往遇是即指為外感內傷而用藥致枉死者多矣悲夫然錢氏論之太略潔古補之今特參附以惠無窮云附方導赤散見驚風症內一見五淋症內瀉黃散見熱症內五臟子母虛實鬼賊微正論潔古云在邪前者為實邪子能令母實但賊傷於母其子又引母所克妻來相助故曰實邪也在後者為虛邪母引子之鬼賊至由母能令子虛也內經曰母能令子虛子能令母虛正此之謂也妻來乘夫為微邪夫來乘妻為賊邪法當瀉鬼補本臟本臟自病為正邪宜虛則補之實則瀉之內經云滋苗者必固其本伐下者必枯其上逆其根伐其本則敗其真矣按劉宗厚云此五行生剋之通論也義見難經五十難及後五臟補瀉治要論宜參考之五臟補瀉之法論潔古云心主熱自病或大熱瀉心湯主之實則煩熱黃連瀉心湯主之虛則驚悸生犀散主之肺乘心為微邪喘而壯熱瀉白散主之肝乘心為虛邪風熱煎大青膏下大青丸脾乘心為實邪瀉利身熱瀉黃散主之腎乘心為賊邪恐怖惡寒安神丸主之按劉宗厚云乘者猶乘車之乘也大抵五臟之病相乘伏匿隱顯莫測以上俱言本病乘勝之道故以五臟之治要附下宜參考焉凡心臟得病必先調其肝腎兩臟腎者心之鬼肝者心之母肝氣通則心氣和肝氣滯則心氣逆此心病先來求於肝清其源也五臟受病必先傳其所勝水能勝火則腎之受邪必傳於心故先治腎逐其邪也當退腎氣抑肝氣兩方或診其脈肝腎兩臟俱和而心自生疾然後審心之虛實治之肺主燥自病則喘嗽燥則潤之實則喘而氣盛瀉白散主之虛則喘而少氣先益黃散而後阿膠散心乘肺為賊邪熱而喘嗽先地黃丸次導赤散後阿膠散主之肝乘肺為微邪惡風眩目昏憒喘嗽羌活散主之腎乘肺為實邪憎寒而嗽清利百部丸主之脾乘肺為虛邪體重吐痰泄瀉參苓白朮散主之凡肺之得病先觀心經之虛實若心火炎上鑠金即當先抑心氣後服肺藥若心氣和更看脾脈若脾氣虛冷即不能相生而肺之生氣不足則風邪易感故患肺寒者皆脾虛得之若脾氣盛實則亦痞膈中焦而大腸與肺表裡不能相通夫中焦熱膈則肺與大腸不通其熱毒之氣必上蒸於肺而生痰故患肺熱者多脾實得之心氣盛者瀉之脾氣虛者益之脾氣實者通之然後隨其脈之寒熱以治之故有益心氣益脾氣通脾氣三藥若診其脈氣心脾兩臟俱和而肺自生痰則但察肺之虛實而治之肝主風自病則風搐拘急肝若急急食甘以緩之佐以酸苦以辛散之實則風搐力大瀉青丸主之虛則風抽力少地黃丸主之心乘肝為實邪壯熱而搐利驚丸主之肺乘肝為賊邪氣盛則前伸吹欠微搐法當瀉肺先補本臟補肝地黃丸主之瀉肺瀉白散主之脾乘肝為微邪多睡體重而搐先當定搐瀉青丸主之搐止再見後症則別立法以治之腎乘肝為虛邪憎寒呵欠而搐羌活膏主之凡肝得病必先察其肺腎兩臟知其病之所因方可治療蓋腎者肝之母金者木之賊今肝之得病若非腎水不能相生必是肺金鬼來相攻不得不詳審而求之故其來在肺先治其肺攻其鬼也其來在腎先治其腎滋其根也然後審肝家本臟之虛實而治之脾主濕自病則泄瀉多睡體重昏倦脾若濕急食甘以緩之實則泄下赤黃睡不露睛瀉黃散主之虛則泄瀉白色睡則露睛白朮散主之肝乘脾為賊邪風瀉而吐茯苓半夏湯主之心乘脾為虛邪壯熱體重而瀉羌活黃芩蒼朮甘草湯主之肺乘脾為實邪能食不大便而嘔嗽煎檳榔大黃湯下葶藶丸腎乘脾為微邪惡寒泄瀉理中湯之類凡脾之得病先察其心肝兩臟之虛實根其源之所起然後救療蓋肝為脾之鬼心為脾之母肝氣盛則鬼勝心氣虧則脾之生氣不足盛者抑之虧則補之所以有抑肝氣益心氣兩法診其脈肝心兩臟俱和則是脾自生疾也察其脈虛實而治之腎主寒自病則足經寒而逆人之五臟惟腎無實小兒瘡疹變黑陷則是腎實水克退心火是以水能制火也心乘腎為微邪內熱不惡寒桂枝湯主之肺乘腎為虛邪拘急氣搐身寒理中湯主之脾乘腎為賊邪體重泄瀉身寒理中丸主之肝乘腎為實邪喘嗽皮濕身寒百部丸主之本臟虛弱是自己正令不行乃為鬼賊所克害當補本臟之正氣假令肺病喘嗽時於初春見之法當補腎見於夏救肺見於秋瀉肺見於冬補心瀉本臟乃名寒嗽大抵五臟各至本位即氣盛不可更補到所克位不可更瀉又按劉氏云五行之間惟有腎之一臟母盛而子反受邪而物之性有不可一概論者肺腎是也何則肺屬金應於皮毛所主者氣腎屬水主於骨髓所藏者精氣之輕浮能上而不能下精之沉重能下而不能上此物性之自然今肺之盛其熱之作也氣得熱則上蒸於肺不能下生於腎而肺受邪矣急宜清涼以解之使肺氣溫和自能下生於腎此腎病必先求之於肺若肺和而腎忽然受病者不過脾之濕刑于腎而生病所以有解肺熱去脾邪兩藥若脾肺兩臟俱和而腎自生病亦察其本臟虛實而治之附方瀉心湯見熱症內牛犀散見目症內瀉白散見咳嗽症內大青丸見驚風症內瀉黃散見熱症內安神丸見疳積症去山藥益黃散見疳積症內阿膠散阿膠大力子蔸鈴子杏仁糯米甘草導赤散生地木通淡竹葉甘草羌活散防風羌活白芷荊芥川芎地骨皮炙草連翹大腹皮鼠黏子柴胡百部丸百部麻黃杏仁參苓白朮散見諸瀉症內瀉青丸見驚風症內利驚丸膽草防風蘆薈南星鉤藤牙硝鐵粉樟腦麝香青黛白朮散見熱症內茯苓半夏湯白茯陳皮黃芩半夏甘草加薑煎葶藶丸見咳嗽症內理丸中見驚風症內桂枝湯見驚風症內五臟伏敵喜傷諸病論心所伏者腎所敵者肺所喜者苦所傷者咸應三變八蒸之臟和則性情悅樂疾則驚癇恐悸虛躁啼叫譫語狂煩涎流口角痘主紅斑肝所伏者肺所敵者脾所喜者酸所傷者辛辣應初變六蒸之臟和則魄壯意智生疾主風變搐搦眼目腫赤而疼痛痘主水泡肺所伏者心心所敵在肝所喜者辣所傷者焦苦應二變七蒸之臟和則喜歡氣爽神清魂強疾主喘滿咳嗽傷寒虛痰壅盛痘主膿泡脾所伏者肝所敵者腎所喜者甘所傷者酸應四變九蒸之臟和則消穀氣美飲食疾主嘔噦疳積虛痢痞癖潮熱不思乳食痘主有疹腎之所伏者脾所敵者心所喜者咸所傷者甘應五變十蒸之臟和主行坐嬉笑語言疾主崩砂黑齒截髮咬牙聤耳膿汁痘主黑陷驗五臟氣絶症全幼心鑑云凡小兒囟門腫陷汗出不流如珠如油舒舌出口舌腫發驚瀉黑黯血髮直如麻皮膚無血色此心絶也壬癸日死頭重啼哭無淚及病不哭下淚爪甲青黑眼深如陷舌卷囊縮發搐目斜連唇口動手如抱頭之狀或腳面平直素問云其華在爪其充在筋肝絶也庚辛日死人中滿黑唇焦枯燥及唇乾紫黑唇不蓋齒面腫尿血舌縮或卷鼻孔開張齒禁冷汗如油撮口如囊面如土色四肢逆冷狀如溫石吃乳不收瀉糞赤黑脾絶也甲乙日死有熱咽湯水並藥食喉中鳴是胃脘直不能蔭肺此症諸書少有纍曾試之並不能治目直青鮮氣喘不回吃食噎嗽痰涎塞口喉中鳴響鼻塞不通及乾黑燥肺脹胃膈頭汗四肢冷肺絶也丙丁日死面黑唇垂眼黑青腫目無光彩耳輪青黃焦枯齒疳發落疏黃皮燥膚黑驚風咳乳戛齒泄氣黑色繞口腎絶也戊己日死運氣總論太極肇分而有陰陽夫陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也故物生謂之化物極為之變陰陽不測謂之神然天地者萬物之上下也左右者陰陽之道路也水火者陰陽之徵兆也金木者生成之始終也陰陽五行流為十干五化之運寒暑燥濕風火之氣周流天地間而為萬物之源人則稟其精而圊於兩間所以具五臟六腑以應五運六氣之數也五運者金木水火土也六氣者風寒暑濕燥火也聖人仰觀五天云色天干取運地支取氣天干有十配合則為五運地支十二對衝則為六氣所以然者天有陰陽地亦有陰陽天以陽生陰長地以陽殺陰藏陽中有陰陰中有陽人在氣交之中身半以上天之分也天氣主之身半以下地之分也地氣主之其生五其氣三三而成天三而成地三而成人三而三之則為九九九成會故生九竅九臟而應之也天有三百六十五日人有三百六十五骨節天有五行御五位以生寒暑燥濕風人有五臟化五氣以生喜怒憂思恐在天為玄玄生神在人為道道生智在地為化化生五味神在天為風在地為木在人為怒神在天為熱在地為火在人為喜神在天為濕在地為土在人為思神在天為燥在地為金在人為憂神在天為寒在地為水在人為恐寒暑五氣更立各有所先非其位則邪當其位則正陰陽之神不可得而見也支幹之迹不可得而求之也天氣始於甲地氣始於子天地相合則為甲子故甲子者干支之始也天氣終於癸地氣終於亥天地相合則為癸亥故癸亥者干支之末也陰陽相兼剛柔相須是以甲子之後乙丑繼之壬戌之後癸亥繼之三十年為一紀六十年為一周有主運焉有客運焉有主氣焉有客氣焉主運主氣萬載不易客運客氣與歲遞遷自天支兄弟次序言之甲乙東方木也丙丁南方火也戊己中央土也庚辛西方金也壬癸北方水也故木為初之運火為第二運土為第三運金為第四運水為第五運此主運也自其夫婦配合言之甲與己合而化土乙與庚合而化金丙與辛合而化水丁與壬合而化木戊與癸合而化火故甲己之歲土運統之乙庚之歲金運統之丙辛之歲水運統之丁壬之歲木運統之戊癸之歲火運統之此客運也假如甲己年為土運初之運即土也土生金二之運即金也金生水三之運即水也水生木四之運即木也木生火五之運即火也與一運各主七十二日零五刻此天干在上為陽所以主乎運也又以地支循環次序言之寅卯屬春木也巳午屬夏火也辰戌丑未屬四季土也申酉屬秋金也亥子屬冬水也故風為初之氣火為二之氣暑為三之氣濕為四之氣燥為五之氣寒為終之氣此主氣也自其對衝定位言之子對午而為少陰君火醜對未而為太陰濕土寅對申而為少陽相火卯對酉而為陽明燥金辰對戌而為太陽寒水巳對亥而為厥陰風木故子午之歲君火主之丑未之歲濕土主之寅申之歲相火主之卯酉之歲燥金主之辰戌之歲寒水主之巳亥之歲風木主之此客氣也假令子午少陽君火司天陽明燥金司地上者右行太陰濕土為天之左間厥陰風木為天之右間所以面南而命其位也下者左行太陽寒水為地之左間少陽相火為地之右間所以面北而命其位也一氣在上一氣在下二氣在左二氣在右地之初間為初之氣天之右間為二之氣司天為三之氣天之左間為四之氣地之右間為五之氣司地為終之氣每一歲主旺六十日八十七刻半有奇此地支在下為陰所以主乎氣也然客運之流行也有太過焉有不及焉太過之年甲丙戊庚壬五陽干也不及之年乙丁己辛癸五陰乾也太過至大寒前十三日交名曰先天不及至大寒後十三日交名曰後天平氣之年正大寒日交名曰齊天客氣升降也有正化焉有對化焉正化之歲謂午未申酉辰亥之年也對化之歲謂子醜寅卯戌巳之年也正化者令之實從本其數生對化者令其虛從標其數成假令甲子年甲為土運統主一年子為君火專司一歲一期三百六十五日零二十五刻正合周天三百六十五度四分度之一也一期之中主運於位而相次於下客運以氣而周流於上客氣加於主運之上主運臨於客氣之下天時所以不齊民病所以由生也六甲年土運太過則雨濕流行濕病乃生腎水受邪治當除濕以補腎六己年土運不及則木氣乘旺反見風化風病乃行治當益脾以平木六丙年水運太過則寒氣大行寒病乃生心火受邪治當逐寒以補心六辛年水運不及則土氣乘旺反見濕化濕病乃行治當補腎以除濕六戊年火運太過則熱氣大行熱病乃生肺金受邪治當降火以補肺六癸年火運不及則水氣乘旺反見寒化寒病乃行治當補心以逐寒六庚年金運太過則燥氣流行燥病乃生肝木受邪治當清燥以補肝六乙年金運不及則火氣乘旺反見熱化熱病乃行治當清肺以降火六壬年木運太過則風氣大行風病乃生脾土受邪治當平木以補脾六丁年木運不及則金氣乘旺反見燥化燥病乃行治當補肝以清燥此客運之治化也太陽寒水治宜辛熱陽明燥金治宜苦溫少陽相火治宜鹹寒太陰濕土治宜苦熱少陰君火治宜鹹寒厥陰風木治宜辛涼此六氣之治法也然運氣之所以有變者氣相得則和不相得則病又有相得而病者以下臨上不當位也五行相生者必相得相剋者為不相得上臨下為順下臨上為逆司天克運則順運克司天則逆氣克運則順運克氣則逆運氣相同曰天符天氣生運曰順化天氣克運曰天刑運生天氣曰小逆運克天氣曰不和運臨本氣之位曰歲會天符歲會相合曰太乙天符運與四孟月相同曰支德符運與交司日相合曰干德符太過之運加地氣曰同天符不及之運加地氣曰同歲會大要陽年先天時化則己強而以氣勝實故不勝者受邪陰年後天時化則己弱而以氣休衰故勝已者未克被克之後必待時而復也行復於所勝則己不可前故待得時則子當旺然後子為母復仇也經曰亢則害承乃制制則生化外列盛衰害則敗亂生化大病又曰有餘而往不足隨之不足而往有餘從之知迎知隨氣可與期又曰出入廢則神機滅絶升降息則氣立孤危故非出入則無以生長壯老已非升降則無以生長化收藏是以升降出入無器不有四有長守反之則災害至矣雖然順逆災害盡皆天之氣運所為也地在人之下大氣舉之也天六動而不息地五靜而有守推之歷日依前交氣常為與歲之主氣又曰地氣若司天在泉左右間輪行而君主氣之上者曰天氣客氣也客氣乃行歲中天命主氣主奉客氣之天而已客勝主則從主勝客則逆二者有勝而無復已經曰先主其年以明其氣每年先主運氣審其太過不及然後以地之主氣為本天之客氣加臨上為標以求六化之變如氣之勝也微者隨之甚者制之氣之湧也和者平之暴者奪之皆隨勝氣安其屈狀以平為期抑考褚氏有曰大堯作甲子隸首作數志歲月日對遠近故以當年為甲子歲冬至為甲子月朔為甲子日夜半為甲子時積一十百千萬六有條而不紊皆人所為也人嬰異氣疾難預擬吾未見其是也籲此一偏之見也不知天時非凡夫所可度人身資大化以生明堂詩曰甲膽乙肝丙小腸丁心戊胃己脾鄉庚屬大腸辛屬肺壬屬膀胱癸腎臟三焦亦向壬宮寄胞絡同歸入癸方又云肺寅大卯胃辰經脾巳心午小未中申膀酉腎心包戌亥三子膽醜肝通觀此二詩則天地人身無時不相流通故一氣不合不能生化天有六氣人以三陰三陽而上奉之臟為陰而其數奇以應五運蓋五行質具於地而氣則行於天也腑為陽而其數偶以應六氣蓋六淫雖降於天而勢必充於地也子午為天地之中正君火位焉手少陰心足少陰腎居之辰戌為七政之魁正寒水位焉手太陽小腸足太陽膀胱居之然火從水化水從腎至故少陰為臟位與太陽隔而氣相合為腑也丑未為歸藏之標本濕土位焉足太陰脾手太陰肺居之卯酉為日月之道路燥金位焉足陽明胃手陽明大腸居之然子隨母居土旺金盛故太陰為臟位與陽明隔而氣相合為府也巳亥為天地之門戶風木位焉足厥陰肝手厥陰心包絡居之寅申握生化之始終相火位焉足少陽膽手少陽三焦居之然相火寄與肝腎膽者肝之府心包絡者腎之配故厥陰為藏位與少陽隔而氣相合為腑也南北三陽司天則皆寸不應三陰在泉則皆尺不應地政三陽司天則皆尺不應三陰在泉則皆寸不應寸不應者皆為沉脈也由此觀之經絡臟腑脈病藥治無非運氣之所為也非只一歲也雖一時一刻之短而必行之氣莫不存非特一物也雖一毫一芒之細而五行之化莫不載上達於天則有五星倍減之應下推於地則有草木蟲肓之驗奈何俗醫不知醫之源者全然不識運氣為何物不知醫之變方又泥時執鈴方以害人要之有在天之運氣有在人之運氣天時勝則舍人之病而從天之時人病勝則舍天之時而從人之病張子曰病如不是當年氣看與何年運氣同只向其年求治法方知都在至真中扁鵲曰陰淫寒疾陽淫熱疾風淫未疾晦淫惑疾明淫心疾雨淫腹疾經曰必先歲氣毋伐天和又曰不知年之所加氣之盛衰不可以為工學者合而觀之更精於脈症乃自得之噫儒之道博約而已矣醫之道運氣而已矣學者可不由此入門而求其蘊奧耶另方滋水益元湯白芍藥當歸生地熟地丹皮茯苓五味子逍遙散黑山梔生地當歸柴胡茯神甘草牡丹皮四逆湯乾薑白朮甘草肉桂或附子清暑益氣湯黃耆一錢升麻一錢蒼朮一錢炒當歸五分白朮五分炒神麯五分乾葛五分門冬五分去心五味子七粒搗陳皮五分人參五分甘草三分澤瀉三分青皮三分黃柏三分
