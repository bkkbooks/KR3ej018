body:
  text: 上卷急慢驚風附慢脾總括面紅卒然渾身熱唇黑牙關氣如絶目翻搐搦喉有聲此是急驚容易決又陰虛陽盛病已深吐余瀉後睡揚睛神昏搐緩涎流甚此症分明是慢驚脈法浮數洪緊為急驚沉遲散緩為慢驚虎口紋青紫為驚風形勢彎入里者為順出外者為逆醫學綱目云搐一也而有晨夕之分表裡之異身熱力大者為急驚身冷力小者為慢驚仆地作聲醒時多沫者為癇頭目仰視者為天吊角弓反張為痓而治各不同也看手法風關青黑如懸針主水驚易治氣關赤色如懸針主疳病兼肺臟積熱猶可治命關凡有此脈不問五色皆是危症又三關通度如懸針主慢驚難治風關青如魚刺易治乃初驚之候黑色難治氣關青如魚刺主疳癆身熱易治命關青如魚刺主虛風邪傳脾難治三關青是四足驚赤是水驚黑是人驚驚風有四症八候四症者驚風痰熱是已八候者搐搦掣顫反引竄視是已搐者兩手伸縮搦者十指開合掣者勢若相撲顫者頭偏不正反者兩手仰向後引者臂若開弓竄者目直視怒視視者睛露不活四症已具八候生焉四症既無八候安有急驚風大叫三兩聲者心絶難治急驚四肢俱軟者不治急驚鼻中出血者為熱將散易治口中出血則難治大小便祕者易治尿屎遺者難治關黑紋直者死四肢厥冷二便不禁服暖胃回陽以治之治之不效乃稱不治豫曾治而效不可因其有此症便説不治也內經曰諸風掉眩皆屬肝木蓋小兒系純陽之體為其真水未旺心火已炎肺金受制而無以平木故肝木常有餘而脾土常不足也為父母者或失於保養抱子當風近於熱地或辛辣多食衣衾過厚邪熱鬱蒸積於心傳於肝再受人物驚觸未發之時夜臥不穩睡中或笑或哭齧齒咬乳鼻額有汗氣促痰鳴忽爾悶絶目直上視口噤不開手足搐掣此熱甚而然沉兼面紅脈數可辨蓋心有熱而肝有風風主乎動火得風則煙焰起二陽相鼓風火相搏肝藏魂心藏神因熱則神魂易動故發驚也心主乎神獨不受觸遇有驚則發熱熱極生風故能成搐名曰急驚以寬氣飲三解散去參主之如暴感此證未別陰陽虛實先用五苓散和寬氣飲少加寬熱飲三藥合用薑汁沸湯調灌即解大抵治搐之法以寬氣為妙氣順則搐停此自然之理乎嘗感慨諸人每見驚風搐作不明標本混為一症遽用金石腦麝蜈蠶蛇蠍大寒搜風等劑投之耗傷真氣其症益甚多致勿救殊不知驚生於心風生於肝搐始於氣是為三症其驚與風首已詳及所謂搐始於氣者蓋因風寒暑濕燥火之氣有一不順便蓄於喉靨間搏於心肺傳入肝經其氣上不能升下不能降使津液鬱滯不得流行故痰涎壅蔽而作搐也亦宜寬氣飲治之病有相似而實不同此余素所經驗近有小兒先覺身熱少頃便僵仆不知人事目睛上視口唇牽動狀如驚風掣跳不止一醫以驚風治之食頃間屢醒屢搐故招豫視之豫問曰兩日熱否病家曰前日時發熱至傍晚方止昨日無恙不意今午後熱遂成驚風豫曰此宿食頑痰膠固於中榮衛不行邪正相攻乃瘧疾也以金石鎮驚之藥投之寧無助火為患乎命渠且勿服藥恐藥毒交攻病勢交劇至下午少減以二陳湯加楂麥青皮檳榔葛防服之至次日瘧作而餘症悉退又服消痰散表之藥四劑而痊愈然當知所以受病如病在驚驚由痰熱得只可退熱化痰其驚自止病在風風由驚作只可利驚化痰其風自散病在痰涎急須退熱化痰若也有搐須用截風散驚此不治之症也東垣云小兒瀉青有驚當先補其土後瀉其木其風木旺症右關脈洪大掌中熱腹皮熱者是也今立一方黃耆益黃散主之人參甘草黃耆各等分此三味皆溫補脾土益元氣甘能瀉火內經云熱淫於內以甘瀉之以酸收之白芍藥酸寒能瀉火酸能瀉肝木而大補肺金所補得金木之位土旺則火虛矣風木何由而來剋土然後瀉邪火旺能實其木木旺故來剋土當於心經中以甘溫補土之源更於脾土中瀉火以甘寒補金以酸涼故致脾土中金旺火衰則風木自虛也矣有傷風后發搐者口中氣出熱呵欠煩悶手足動搖此氣血未實不能勝任故也治當先發散大青膏主之有傷食後發搐者身溫多睡或嘔吐不思乳食此食滯而氣亦因之而滯故發搐也當先定搐加羌活防風兼下瀉青丸後用白餅子下其食漸用異功散養其氣有欲出麻痘而發搐者身溫多睡或嘔吐不欲飲食此乃熱乘於心心火炎上故目睛上竄其症耳輪鼻尖手足梢冷噴嚏眼澀睡中驚跳是也但無痰涎為異耳治法當平肝木利小便平肝木則風自去利小便則心熱除風熱既退則痘出而搐愈矣宜導赤散加白芍防風荊芥之類有痘後發搐者此氣血虛弱復感風寒熱毒交滯且不敢發散清利不治者多矣有小兒聞聲即掣跳者乃肝肺不足魂魄不安故神有不穩非謂驚也可服犀角地黃丸又有小兒心氣虛怯神不安定連並掣跳者可服四君子湯加辰砂少許服之暑風一症因夏日感冒風熱太甚致面垢唇紅脈沉細數忽發驚搐不省人事治用消暑清心飲辰砂五苓散及抱龍丸慢驚屬陰陰主乎靜而搐緩故曰慢驚或得於大病之餘或傳誤轉之後目慢神昏手足偏動口角流涎或口氣冷緩或囟門陷下睡則揚睛或半開半合此真陽消耗而陰邪獨盛陰盛生寒寒為水化水生肝木木為風化木克脾土胃為脾之腑故中有風瘛瘲漸生兩肩微聳兩手垂下時復動搖不已也此症有汗者必不治故仲景曰陰不得有汗蓋陰症無汗有汗者亡陽耳治法不可一概用藥如吐瀉得之則理中湯加木香以溫其中五苓散以導其水如臟寒泄瀉得之則先與朮附湯下積取轉得之則先與調氣湯調和脾胃如外感風寒則可與桂枝湯葛根湯其他可類推矣然慢驚雖屬陰視其淺深如何不可純用溫藥及燥烈之劑惟於平胃氣中加截風定搐之劑如全蠍殭蠶白附天麻南星等劑為良方若吐不止可投定吐飲瀉不止宜服六柱散五苓散若痰多唇白四肢如冰不醒人事方可回陽用固真湯速灌之以生胃氣胃氣既回投醒脾散徐徐調理慢脾之候面青額汗舌卷低頭眼合不開困睡中搖頭吐舌頻嘔腥臭噤口咬牙手足微搐而不收或身冷或身熱其脈沉細蓋由慢驚之後吐瀉損脾病傳已極總歸虛處惟脾所受故曰慢脾若逐風則無風可逐若療驚則無驚可療但脾間涎痰虛熱往來其眼合者脾困氣乏神志昏迷痰涎壅滯然耳世所謂難療者是也大要生胃回陽金液丹生附四君子湯酌而用之胃氣漸復仍服醒脾散異功散之類諸藥不效者如有太衝脈則取百會穴灸之可也急驚不治症口中出血通關不嚏間或亦有生者眼睛反轉口中出血兩手擺挑肚腹搐動或神緩而摸體尋衣或症篤而神昏氣促噴藥不下通關不嚏心中熱痛忽大叫者不治慢驚不治症四肢厥冷面黯神慘鴉聲魚口口生白瘡髮直搖頭眼不轉睛頭項軟二便不禁手足一邊牽引者不治慢脾不治同補遺凡遇驚風發搐時聽其自動自止不可搶緊使其氣得通暢不然定有驚癱之症急驚用藥先與截風定搐次與下熱熱去則無風風去則不搐傷風傷寒之症熱極不能發搐但牙關不緊此為似搐小兒驚風握拳者此胸中有毒涎耳須看男左女右男子握大指於內為順叉指者惡症也其吉凶雖不盡系此然亦有驗附方寬氣飲枳殼炒枳實人參甘草三解散人參防風天麻茯神山梔白附大黃赤芍黃芩殭蠶全蠍枳殼甘草實者加大黃藿香虛者加人參五苓散白朮豬苓茯苓澤瀉肉桂寬熱飲玄明粉枳殼大黃甘草黃耆益黃散人參黃耆甘草白芍陳皮黃連白茯苓大青膏白附青黛天麻全蠍硃砂烏蛇麝香天竺大青葉瀉青丸當歸膽草川芎山梔羌活防風大黃白餅子滑石輕粉半夏南星巴豆四十粒去皮尖水一升煎水盡為度研入藥內為餅異功散人參甘草白朮茯苓陳皮木香導赤散生地木通甘草竹葉犀角地黃丸天冬麥冬茯苓茯神前胡柴胡人參玄參生地川芎天麻羌活防風甘草四君子湯人參白朮茯苓甘草消暑清心飲藿香澤瀉白朮茯苓肉桂辰砂牛黃抱龍丸西牛黃二錢天竹黃一兩琥珀七錢陳膽星一兩殭蠶六十個川貝一兩枳殼一兩茯神六錢沉香五錢制腰黃五錢麝香一錢飛辰砂一兩金箔三分竹瀝丸去西黃南星天蟲名琥珀抱龍丸余加制軍五錢蟬衣五十隻生甘草湯丸名赤抱龍丸理中湯人參白朮乾薑炙甘草朮附湯白朮附子甘草調氣湯木香香附人參陳皮藿香甘草桂枝湯桂枝芍藥生薑甘草大棗葛根湯乾葛麻黃芍藥桂枝甘草定吐飲半夏生薑薄桂六柱散人參茯苓木香白朮肉果熟附子固真湯人參附子白朮茯苓山藥黃耆肉桂甘草醒脾散木香全蠍白附天麻石蓮菖蒲茯苓白朮人參甘草金液丹舶上硫黃十兩研細入罐內煅過用生附四君子湯人參白朮茯苓甘草生附子如前藥四分中之一疳積總括五疳五臟五般看治法詳推事不難若見面黃肌肉瘦齒焦發豎即為疳又曰凡養小兒宜戒謹酒肉油膩偏生病生冷硬物涼水漿不與自無疳癖症脈法脈單細為疳勞虎口脈紋白為疳氣關青如魚刺主疳癆氣關赤色如懸針主疳病兼肺臟積熱內經曰數食肥令人內熱數食甘令人中滿其病因肥甘所致故名曰疳若夫小兒乳哺未息胃氣未全父母不能調攝惟務姑息舐犢之愛遂令恣食肥甘生冷積滯膠固以致身熱體瘦面色萎黃或肚大青筋蟲痛瀉痢而諸疳之症作矣錢仲陽曰諸疳皆脾胃之病內亡津液而作也因大病後或吐瀉後以藥下之脾胃虛弱內無津液而成且小兒病疳大都庸醫之所壞也小兒身發虛熱皆當依本臟而補其母則子自安假令日中潮熱是心經虛熱也肝為心之母宜先補肝肝實而後瀉心心得母氣則內平而潮熱愈矣醫見潮熱妄謂其實乃以諸冷藥利之利既多矣不能禁約而精液內亡即成為疳也又錢仲陽曰肝疳一名筋疳白膜遮睛或瀉血而瘦用地黃丸心疳面黃頰赤身體壯熱用安神丸脾疳一名肥疳體黃瘦削皮膚乾燥面有瘡疥腹大嗜土用益黃散腎疳一名骨疳肢體削瘦遍生瘡疥喜臥濕地用地黃丸肺疳一名氣疳喘嗽氣促口鼻生瘡用益黃散按仲陽此論皆補其母也亦當參看又仲陽曰凡小兒疳在內目腫腹脹瀉痢青白體漸瘦弱疳在外鼻下赤爛頻紐鼻耳或肢體生瘡鼻瘡以蘭香散敷之用蘭香藥二錢燒存性用青黛輕粉各五錢為細末干敷之又白粉散用烏側骨末一匙白及末二匙輕粉一匙為末和勻用冷茶洗瘡拭乾敷之此醫口外疳瘡者又有小兒幼小缺乳與食粥飯太早耗傷真氣亦能成疳其病關於五臟因脾家一臟有積不治傳之餘臟而成五疳之疾故有五疳之分焉肝疳即風疳其症搖頭揉目白膜遮睛面青多淚頭焦發立遍身瘡癬是也宜服天麻丸心疳即驚疳其症壯熱臉紅口舌生瘡五心煩熱盜汗發渴咬牙虛驚是也宜用茯神丸脾疳即食疳其症身面俱黃肚大腳細吐逆中滿水穀不消泄下酸臭合面困睡減食吃泥是也宜用靈脂丸肺疳即氣疳其症咳嗽喘逆壯熱惡寒皮膚粟生鼻癢流涕咽喉不利頤爛氣脹泄瀉頻並毛焦吐血是也宜用化𧈟丸腎疳即急疳其症腦熱肌削手足如冰寒熱時來滑瀉肚腹痛口鼻乾渴齒齦生瘡爪黑麵黧身多瘡疥是也宜用地黃丸大抵疳之為症頭皮光急毛髮焦稀面黃唇白身汗口渴尿白瀉酸肚脹潮熱皆其候也蛔蟲者失乳飯早或食肉太早以致停蓄積滯化而為蟲其症皺眉多啼嘔吐清水腹中作痛肚脹青筋唇口紫黑腸頭濕癢是也化蟲丸主之脊疳者蟲蝕脊膂身熱羸黃積中生熱煩渴下利拍背如鼓鳴脊骨如鋸齒或十指生瘡頻吃爪甲是也下蟲丸主之腦疳者腦中素受風熱生下乳哺失常頭皮光急頭瘡如餅頭熱如火髮直如穗遍身多汗腮腫囟高是也臨産多欲亦然最易損兒眼龍膽丸主之疳腫脹者虛中有積其毒與氣並交故令肚腹緊張由是脾腹受濕或冷熱不調虛中不能宣導故令頭面四肢浮腫是也褐子丸主之疳癆者潮熱往來五心煩熱手足心及胸前熱而發瘡盜汗骨蒸嗽喘枯悴是也其症渴而復瀉飲水惡食肚硬如石面色如銀不可治矣急服黃耆湯無辜疳者腦後項邊有核如彈按之轉動軟而不疼其間有蟲如米粉宜速破而去之免蟲隨熱氣流散淫食臟腑以致肢體癰瘡便利膿血壯熱羸瘦頭露高骨是也以針刺破膏藥貼之然後服蚵皮丸丁奚者手足極細項小骨高尻削體痿腹大臍突號哭胸陷或生谷癥是也哺露者虛熱往來頭骨分開翻食吐蟲煩渴嘔噦柴骨瘦露是也其候皆因脾胃久虛不能消化水穀以致精神減損無以榮其氣血而成此二症也十全丹主之鬾症者因兒生後周晬母復有孕血氣所蔭分之兩端是故胚胎漸傷乳汁成毒兒吻致疾斂萃其氣郁傷其神令兒面黃腹脹微微下利寒熱來去毛髮鬇鬡日漸黃瘦精神不悅乃是飲母鬾乳故也宜速斷乳平胃氣和血脈可也服龍膽湯附方安神丸麥門冬馬牙硝白茯苓山藥寒水石甘草硃砂片腦為丸服益黃散陳皮一錢青皮訶子皮甘草各五分丁香二分共為末水煎服加人參白朮各一錢服效天麻丸青黛黃連天麻蘆薈膽草防風川芎蟬殼全蠍麝香五靈脂夜明砂茯神丸茯神蘆薈琥珀赤茯苓鉤藤麝香遠志蝦蟆黃連菖蒲靈脂丸砂仁白蔻麥芽莪朮青皮陳皮使君子肉蝦蟆五靈指化𧈟丸蕪荑蘆薈青黛川芎白芷梢蝦蟆灰胡黃連地黃丸熟地赤茯苓山藥丹皮山茱萸使君肉當歸川芎川楝子化蟲丸蕪荑鶴蝨檳榔蝦蟆蘆薈下蟲丸木香桃仁蕪荑檳榔鶴蝨輕粉蝦蟆使君肉新苦楝根皮龍膽丸膽草生麻防風赤茯苓油發青黛黃連蘆薈苦楝根褐子丸卜子陳皮青皮檳榔黑醜赤茯苓莪朮木香五靈脂一方用三稜胡椒神麯無黑醜赤茯苓靈脂黃耆湯黃耆當歸川芎芍藥生地蝦蟆鱉甲人參茯苓陳皮柴胡半夏使君子肉蚵皮丸蟾蜍一個要腹大不鳴不跳身多癩者取糞蛆置桶中即將蝦蟆打殺放在蛆中任與之食一日一夜以布袋包蛆置水流急處浸一宿取來瓦上炙為末入麝香一匙飯糊為丸每服二十丸十全丹陳皮青皮莪朮川芎白蔻檳榔蘆薈蝦蟆五靈脂木香使君子龍膽湯膽草鉤藤柴胡桔梗芍藥川芎茯苓人參大黃甘草諸吐女子嘔吐甚者死以其陰在上故也總括面青唇白冷為真熱吐腥酸頭額溫停食作痰嘔乳逆不宜尿濕燥紅唇脈法脈浮而遲氣少不語者難治內經曰諸嘔吐酸暴注下迫皆屬於火河間曰胃膈熱甚則為嘔火氣炎上之象也夫吐謂有物無聲噦謂有聲無物嘔者謂有物有聲也前人以吐為屬火此特其一端耳吐屬太陽多血少氣乃血病噦屬少陽多氣少血乃氣病嘔屬陽明多血多氣氣血俱病也冷吐者片乳不消多吐而少出脈息沉微面白眼慢氣緩神昏額上有汗此因風寒入胃或食生冷或傷宿乳胃虛不納而出宜溫胃去寒理中湯定吐飲如不虛以參香飲治之熱吐者面赤唇紅吐次少而出多乳食不消而色黃遍體熱甚或因暑氣在胃或食熱物精神不悅而多煩渴躁宜服香薷飲諸吐者眼胞浮面微黃足冷肚熱晝輕夜重兒大者脈沉緩此宿乳滯胃故吐黃酸水或有清痰脈實而滑為食積所傷吐酸醙氣或宿食並出兒小哯乳不化宜三稜散傷風嗽吐有熱生風有風生痰痰結胸中肺氣不順連嗽不止和痰吐出此為嗽吐痰壅而作乃為實症宜去風化痰先服小柴胡湯若瀉久脾虛土不生金面白唇燥干嗽乾嘔無痰可去溫補為上用茯苓厚朴湯惺惺散傷乳吐者才飲乳後即吐或少停而吐此因乳飲無度脾氣虛弱不能運化譬之小器盛物滿則溢也更當節乳投三稜散嘔家多渴胃之津液干也欲飲水以自救宜少與之不可多也多則反吐謂之水逆宜五苓散有時噁心常吐清水心胃作痛得食即暫止飢則甚者此胃中有蛔蟲也宜檳榔散大抵嘔吐第一要節乳徐徐用藥調治蓋節者樽節之節無過飽也如不明此理動輒斷一二日以致餒甚而胃虛反致不救者多矣切須知之丹溪曰胃中有熱膈中有痰令人時常嘔吐清水作噯氣吞酸等症用二陳湯加薑汁炒黃連山梔蒼朮川芎香附砂仁神麯山楂少加木香以行滯氣加薑水煎服批嘔家聖藥生薑信矣然氣逆作嘔生薑散之痰與水作嘔半夏逐之生薑治寒證最佳然熱嘔不可無烏梅也凡病嘔吐切不可下以其逆之故也此丹溪之論而東垣乃云吐而大便不通則利大便上藥在所當禁二説相反要當審其通與不通而治耳附方理中湯見驚風症內定吐飲見驚風症內參香飲人參沉香丁香藿香薑汁香藿飲香藿扁豆厚朴黃連三稜散人參莪朮三稜陳皮枳殼香附青皮益智神麯穀芽半夏大黃紫蘇甘草小柴胡湯半夏黃芩柴胡人參薄菏甘草茯苓厚朴湯茯苓厚朴半夏甘草惺惺散人參桔梗茯苓白朮防風川芎細辛膽星天花粉甘草五苓散見驚風症內檳榔散黑錫炒成灰檳榔末各等分米飲調服苦楝湯下亦可和中桔梗湯茯苓一錢半夏七分陳皮八分白朮八分生薑九片枳實八分炒厚朴八分薑汁炒桔梗八分荊黃散荊芥二錢人參一錢甘草五分大黃六分加檳榔末一錢木香五分二陳湯茯苓半夏陳皮甘草白朮諸瀉總括脾虛胃弱病根成水穀如何運化行清濁相干應吐瀉久傳虛瀉使風生脈法泄主脈緩時小結者生浮大者死內經曰春傷於風夏必飧泄又曰濕勝則濡泄夫脾胃同濕土之化主腐熟水穀胃氣和平飲食入胃清氣則輸於脾土歸於肺金行於百脈而成營衛若飲食一傷起居不時損其胃氣則上升精華之氣反下降而為飧泄矣批大凡瀉屬氣虛火痰食積瀉水而腹不滿者是濕飲食入胃不行完穀不化是氣虛腸鳴瀉水痛一陳瀉一陳是火或瀉或不瀉或多或少是痰腹痛甚而瀉瀉後痛減是食積暴泄非陰久泄非陽諸書皆以泄瀉宜利小便此乃萬古不易之定論若久瀉脾虛陽氣衰弱伏於陰中若用淡滲之藥是降之又降抑其陰而重竭其陽則陽愈削而精神愈短矣宜用升陽氣藥以羌活獨活柴胡升麻防風甘草治之大法寒濕之勝助風以平之又曰下者舉之得陽氣升騰而病去矣此東垣治法冷瀉多是白水瀉密而少腹痛而鳴眉皺目慢面帶白色額上汗多此為冷瀉用守中湯益中膏熱瀉大便黃色如筒吊水瀉過即止半日復然心煩口渴小便黃少食乳必粗此為熱瀉用五苓散及香茹飲傷食瀉因飲食過多有傷脾氣遂成泄瀉故大便不聚臭如破卵宜三稜散水瀉謂之洞瀉乃陰陽不順水穀不分瀉黃水而小便少番次密而無度此為冷熱相激清濁渾亂或因乳有熱氣遂以哺之令兒脾胃不和水穀交雜而下以㕮咀五苓散加薏苡車前子半夏水薑煎服後用香薷飲妙積瀉者脾氣虛弱乳食入胃不能運化積滯日久又為冷食所傷傳之大腸遂成泄瀉留連不止諸藥無效蓋以積在脾胃積既未除何由得愈宜先去積後止瀉瀉止實脾則病除矣三稜散香橘餅參苓白朮散批燥濕四苓散加蒼朮倍加白朮甚者二術炒為末水飲調服氣虛用人參白朮芍藥火宜伐火利小水四苓加滑石黃芩梔子木通痰用海石青黛黃芩神麯為丸服或用吐以提其清氣食積宜消導疏滌之神麯大黃枳實之類水瀉用蒼朮厚朴陳皮茯苓豬苓澤瀉地榆甘草冬加乾薑胃不和者用胃苓湯世以澀藥治瀉病久而虛者可若初得必變他症為禍不小不知瀉多因於濕利小水者為上驚瀉者糞青如苔稠若膠黏不可便止但鎮心益肝和脾胃消乳食斯為治矣投三解散五苓散水薑倉米煎服疳積釀瀉其候面赤萎黃肚脹腳弱頭大項小發稀直豎肌肉削瘦不思飲食晝涼夜熱或腹內有癥瘕氣塊瀉則顏色不等其臭異常其瀉有時或一月半月一番自瀉自止先用當歸散加三稜陳皮煎服次投三稜散俗云受肚瀉乃飲食滿腹脾弱運化不及故積滿而瀉瀉盡而止後又如是宜調脾胃節飲食為上附方守中湯桔梗蒼朮甘草薑汁益中湯肉果丁香砂仁訶子陳皮青皮馬芹甘草五苓散見驚風症內香薷飲見諸吐症內三稜散莪朮三稜益智陳皮神麯麥芽甘草嗽加半夏香橘餅木香陳皮青皮厚朴砂仁神麯麥芽三稜參苓白朮散人參茯苓白朮砂仁薏苡蓮肉扁豆甘草桔梗山藥三解散見驚風症內當歸散當歸赤芍大黃川芎麻黃甘草四苓散澤瀉豬苓去皮白朮茯苓加木通水煎服或為末白湯調下吐瀉總括小兒吐瀉有多般不可將來一例看若見神昏目慢候慢脾驚搐要提防脈法洪者為熱弦者為痛微弱漸遲者死漸大者生若有宿食留飲氣口脈必弦滑內經曰脾虛則瀉胃虛則吐又曰食滯於胃口者為吐食滯於大小腸者為瀉又曰諸嘔吐酸暴注下迫皆屬於熱錢仲陽曰吐乳瀉黃傷熱乳也吐乳瀉青傷冷乳也皆當下之則知虛實寒熱皆能成吐瀉之症又有傷風吐瀉身溫乍涼乍熱多睡氣粗大便黃白色嘔吐乳食不消更兼咳嗽先服大青膏發散後用益黃散和胃若吐瀉身熱多睡能乳吐痰飲水不止大便黃水此胃虛之症先用白朮散生津止渴後用大青膏發散風邪錢仲陽曰小兒初生三日內吐瀉身熱不思乳食大便青白乳食不消或白色是傷乳當下之然後和胃夏至後吐瀉身熱或傷熱或傷乳吐乳不消瀉深黃色宜香薷散之類小兒傷食及濕熱作吐瀉者須以胃苓湯進反覺平安凡遇小兒吐瀉惟恐脾虛生風之患心鑑云兒分長幼察病虛實有吐瀉三五日發風者有一日半日而發者大抵女孩以吐為急男子以瀉為迫若氣虛暴瀉暴吐才作便得之惟有疳瀉不成風候久則終於虛乏不治矣但瀉宜實脾為主吐以生胃為本截風之藥略加用之凡驚藥及寒涼之藥初不可用大熱藥慎勿妄投錢氏不分寒熱吐瀉而曰皆當下恐未妥當不若傷熱者用五苓散以導其逆傷冷者用理中湯以溫其中自然平復附方胃苓湯蒼朮白朮豬苓澤瀉厚朴陳皮茯苓甘草加桂少許大青膏見驚風症內益黃散見疳積症內五苓散去肉桂用甘草理中湯俱見驚風症內霍亂吐瀉總括病人霍亂事堪驚吐利交併又轉筋心腹痛疼時眩暈宜分乾溼審三因脈法脈來浮洪者可治微而遲者難生內經曰太陰所至為中滿霍亂吐下有土鬱之發民病嘔吐霍亂注下濕土霍亂即仲景五苓散理中湯之類有水土不及風乃大行民病霍亂飧瀉體重腹痛筋骨強並土虛風勝霍亂即羅謹甫桂苓散白朮散之類有熱至則身熱霍亂吐下熱霍亂即活人書香薷飲之類仲景曰邪在上焦則吐在下焦則瀉邪在中焦則既吐且瀉夫小兒霍亂之候皆因飲食內有所傷外有所感陽不升陰不降乘膈而成故卒然吐瀉並作揮霍撩亂矣為病之源有三吐者暍也心火炎上之疾也瀉者濕也濕土注下之疾也轉筋者風也木火撓亂之疾也由夏秋之間濕熱大作風涼乘之入於脾胃三氣俱作所以上吐下瀉而轉筋也治法以生薑細切漬以新汲水調益元散頓服之可愈或五苓散桂苓甘露飲切勿與穀食米飲如飲下咽立死待瀉後飢甚可與稀粥霍亂亦有病症不同有心腹卒痛吐利寒熱頭痛眩暈先心痛則先吐先腹痛則先利心腹並痛則吐利俱作甚則轉筋入腹則斃蓋陰陽反戾清濁相干陽氣暴升陰氣頓墜陰陽痞膈上下奔趨治之惟宜溫暖更詳其所因而調之因風則惡風有汗因寒則惡寒無汗濕則重著暑則熱煩此外因所致元氣不足郁聚痰飲痞膈滿悶隨其腸瀉而作此內因所致其或飽餐恣飲填脹停凝而發此非內外因也小兒夏日多食生冷因脾虛不能運化加以外感風寒則揮霍撩亂上吐下瀉也令人倉卒躁擾痛悶似有鬼神然實非鬼神乃飲食痞膈上下不通將欲吐瀉故如是也批霍亂死者胸中尚有暖氣急以鹽填臍內灸之不計壯數此法灸之立蘇錢仲陽謂吐乳瀉黃是傷熱乳吐乳瀉青是傷冷乳皆當下之詳夫此理乃迎奪之法也不若傷熱者用五苓散以導其逆傷冷者用理中湯以溫其中自然平復批乾霍亂吐瀉不通最為難治用軟雞翎蘸清油探喉中即吐或鹽湯白礬湯灌之亦可經云濕霍亂死者少乾霍亂死者多夫乾霍亂者忽然心腹脹滿胸脅刺痛欲吐不吐欲利不利是俗謂之絞腸痧最難治死在須臾升降不通故也治法先疏利或吐提其氣最是良法更宜刺委中並十指出血妙委中在足膝腕內約紋中動脈便是附方益元散即天水散加硃砂滑石六兩甘草一兩硃砂桂苓甘露飲即五苓散加滑石甘草寒水石白湯調服桂苓白朮散即甘露飲加滑石玉露散治口渴身熱大小便不利寒水石二兩石膏二兩甘草三錢為細末飛過麥冬湯下香薷飲見諸吐症內丹溪方蒼朮厚朴陳皮乾薑各一錢半滑石三錢白朮二錢木通一錢炙甘草薑煎服瘧疾瘧母詳細當與積聚參看總括面黃發豎瘧之因外感風寒暑濕成內郁七情飢餓後故令寒熱往來生脈法瘧脈因弦微則為虛代散則死內經曰夏暑汗不出者秋成風瘧又曰夏傷於暑秋必痎瘧丹溪曰痎瘧皆生於風此前人論瘧之大概也殊不知風寒暑濕邪自外來飲食居處邪由內作豈特夏傷於暑秋必發瘧哉蓋傷之淺者近而暴傷之深者遠而為痎痎者久瘧也要知瘧之寒熱乃陰陽之二氣互相勝負而作也邪並於巨陽則陰實陽虛故寒作邪並於巨陰則陽實而陰虛故熱作此陰陽相移也病氣舍於皮膚與衛氣並居衛氣者日行陽夜行陰此氣得陽而外出得陰而內薄是以日作此受之淺也其氣之舍深薄於五臟陽氣獨發陰邪內著陰與陽終爭不得出故間日作此受之深也邪氣與衛氣客於六腑而有時相失不能相爭故休數日乃作此受之最深也然瘧之狀不一足太陽瘧膀胱經令人腰痛頭重寒從背起先寒後熱熇熇然熱止汗出乃已足少陽瘧膽經令人身體解㑊寒不甚熱不甚惡見人見人則惕惕然熱多汗甚足陽明瘧胃經令人先淅淅寒寒久乃熱熱去汗出喜見日月火氣乃快然足太陰瘧脾經令人不樂好太息不嗜食多寒熱汗出病至則喜嘔嘔已乃衰足少陰瘧腎經令人嘔吐甚熱多寒少欲閉戶而處其病難矣足厥陰瘧肝經令人腰痛小腹滿小便不利如癃非癃也數便意恐懼氣不足腹中悒悒此六經之瘧也肺瘧者令人寒寒甚熱熱間善驚如有所見心瘧者令人煩甚欲得清水反寒多不甚熱肝瘧者令人色蒼蒼然太息其狀若死者脾瘧者令人寒腹中痛熱則腸鳴鳴已汗出腎瘧者令人灑灑然腰脊痛宛轉大便難目眩眩然此五臟之瘧也東垣云寒瘧屬太陰熱瘧屬陽明風瘧屬少陰溫瘧屬厥陰又作於子午卯酉日者屬少陰作於寅申巳亥日者屬厥陰作於辰戌丑未日者屬太陰蓋三日一作故耳而丹溪又有食瘧痰瘧風瘧暑瘧老瘧瘧母之名皆不越乎五臟六腑經之所主也但所感不同耳然因其所挾而立名也今並及之以備參考若夫小兒抱持解脫不避風寒又冒暑濕致令邪氣客於皮膚痰飲乳食潰於臟腑初起雖先於消導然抉胃氣為本後隨其得病所由而調理之如邪瘧及暫發者可散可截虛瘧及久者宜補氣血若過服截藥致傷脾胃則必延綿不休凡熱多寒少無汗者桂枝麻黃各半湯汗多者柴胡桂枝湯汗多而渴者白虎加桂枝湯小便赤熱多寒少者小柴胡湯寒多熱少者用清脾飲養胃湯久不止者鬼哭散止之熱多汗出腹痛而渴者大柴胡湯下之久瘧不愈腸中結塊者鱉甲飲調之凡脾虛而患瘧者不論三陰六經悉以六君子湯為主熱多加柴胡山梔黃芩甚者加知母地骨皮鱉甲寒多加乾薑肉桂有汗加黃耆浮麥無汗加蒼朮葛根元氣下陷及肝木乘脾並加升麻柴胡為善若用青皮常山草果之類正氣益虛邪氣益深而變症百端矣有小兒瘧疾變作虛浮外腎腫大或食傷脾胃以致浮腫夫浮者脾之外應也宜大腹皮湯草果飲治之然後以實脾補劑進之可也若乳母七情六欲不調及飲食不節或寒熱似瘧肝火熾盛致兒為患者又當治其乳母斯無誤矣有陰虛症每日午後惡寒發熱似乎瘧者至晚亦得汗而解若作瘧治而用常山草果等藥誤矣且陰虛脈虛濡而數瘧脈弦數為辨耳有癖痞而為寒熱似瘧者亦不可作瘧治也批久瘧則元氣虛損若誤服清脾飲多致不起慎之截瘧飲亦不宜服瘧後食少無力面黃身弱以四君子湯加二陳湯薑汁炒黃連枳實若草果常山性猛善驅逐病人稍虛者勿用瘧脈弦數腎胃虛外感內傷共有之歸芎人參鱉甲飲半朴檳青甘草施二術烏梅薑黑豆桃枝煎酒露飲之寒多加桂因寒盛熱多柴苓酒炒宜渴加知母天花粉元氣不足升麻提夜發升麻加桔梗久瘧常山草果隨截法常山蒼厚朴陳皮黃連檳榔果七味烏梅酒水煎何首茯苓三四兩二三陳朴不須言十分甘草煎宿露藥飲空心瘧遇仙附方桂枝麻黃各半湯桂枝白芍麻黃甘草杏仁生薑大棗柴胡桂枝湯柴胡桂枝黃芩半夏人參甘草白虎加桂枝湯石膏知母桂枝甘草小柴胡湯見諸吐症內去薄荷清脾飲初起者宜服蒼朮半夏草果青皮黃芩柴胡厚朴陳皮茯苓枳殼紫蘇甘草養胃湯病虛者宜服藿香蒼朮厚朴半夏陳皮草果茯苓人參甘草鬼哭散大腹皮常山茯苓鱉甲大柴胡湯柴胡黃芩半夏芍藥枳實甘草大黃酒製鱉甲飲李自才用何首烏紅白各半酒煎服白朮陳皮草果川芎芍藥檳榔黃芩厚朴鱉甲甘草六君子湯人參白朮茯苓甘草陳皮半夏大腹皮湯枳殼蒼朮檳榔甘草三稜蓬朮大腹皮草果飲厚朴青皮草果藿香半夏丁香甘草乾薑神麯痢疾附脫肛總括痢名滯下古來言赤白腸中痛可憐補澀厚腸須緩用治之當以痢為先脈法內經曰腸癖下血身熱則死寒則生腸癖下白沫脈沉則生浮則死內經曰溲而便膿血知氣行而血止也又曰少陽在泉火淫所勝民病注泄赤白錢仲陽曰瀉痢黃赤黑皆熱也瀉痢青白米穀不化皆冷也丹溪曰赤痢屬血自小腸來白痢屬氣自大腸來皆屬濕熱之氣如夏秋之間溽暑時行此濕熱之氣生於外感者也恣飲酒酪生冷耽嗜肉食肥甘此濕熱之氣生於內傷者也內外交感乃成痢疾若諸書概以赤為熱白為寒則誤矣其有白痢得卒熱而愈者亦因素稟虛弱腸胃虛寒耳然有手足指冷時欲飲熱為驗也其有赤白兼下者氣血俱病也下如豆汁色者濕勝也如五色之相染五臟俱受病也純血者熱毒入深也魚腦色者脾虛不運陳積脫滑下凝也如鼻涕凍膠者臟腑虛脫滑也如白膿者虛坐弩圊而出氣受熱邪瘀結也如屋漏水塵腐色者元氣憊弱之甚也後重裡急至圊而不能便下窘迫痛甚大腸經氣滯不通濕熱內甚也後重裡急初病元氣未虛裡急甚者下之下後余積未清不可驟補宜化滯清熱蕩滌之直候積盡方可調補氣血今人不問新久便行止澀為害不淺善治者辨明寒熱虛實氣血之症而行汗下清溫補澀之法可也丹溪曰瀉屬脾而痢屬腎先水瀉而後膿血者此脾傳腎賊邪難愈先膿血而後水瀉者此腎傳脾微邪易愈凡久痢用溫藥止之然須以陳皮為佐恐澀則常作痛也夏秋之間忽有暴寒折於暴熱無所發散客於皮膚之中發於外則為瘧發於內則為痢內外俱發則為瘧痢耳有初病挾外感者發熱惡寒身首俱痛此為表症宜以微汗而解則痢自止不止者以柴苓湯和之不可遽下遽止也初得而腹痛窘迫者此肺金之氣鬱於大腸之間實者必推蕩之此通因通用之法宜大承氣湯或謂胃承氣湯以下之下後不止者以河間芍藥湯和之下痢赤積身熱腹痛裡急後重者宜芍藥湯調天水散下痢白積腹痛裡急後重者用芍藥黃連湯調天水散血痢久不止者宜煎四物湯下黃連阿膠丸有下黑積中常有紫黑色而又痛甚者此屬死血症宜桃仁承氣湯下之如受痛既久氣血俱傷故纏綿而赤白兼下脾胃氣陷或經年者名休息痢宜阿膠梅連丸有積毒之氣上衝而嘔惡者清解為主人參敗毒散有胃氣虛寒而嘔惡者溫補為主附子理中湯噤口者因脾胃濕熱之毒熏蒸清道而上以致胃口閉塞而成不食之症亦有脾胃虛而不能食者亦有誤服痢藥致藥毒犯胃而不食者亦有服溫澀藥太早邪氣閉遏胃口而不食者或用石蓮肉以通心氣敗毒散以散毒邪山藥以補脾胃果能開胃口而進飲食乎其毒氣上衝者宜丹溪方以人參黃連二味呷之得一口下咽便好一方加石蓮肉其脾胃虛者用仁齋法以參苓白朮散加石菖蒲末陳粳米湯調下此方有蓮肉山藥胸次一開自然能食有時疫作痢傳染相似宜推明運氣之勝負以治之所謂勝負者不越六氣之變也四時疫痢宜首用敗毒散加陳皮陳倉米名倉廩湯隨所勝之氣加減用之批河間曰行血則便膿血自愈和氣則後重自除病機要曰後重則宜下腹痛則宜和身重則宜除濕脈弦則宜去風痢屬濕熱與食積芩連白芍皆入此木香枳殼佐檳榔主方便用甘草炙腹痛當歸縮砂仁後重生芍炒滑石紅入桃仁芎與歸白增炒滑茯苓朮初起欲下倍大黃食積山楂加枳實如力倦氣少惡食此為挾虛症宜用白朮歸身尾甚者加人參陳皮補之虛回而痢自止腹痛因肺金之氣鬱在大腸實則可下虛則桔梗發之有積毒之氣上衝而嘔惡者清解為主人參敗毒散有胃氣虛寒而嘔惡者溫補為主附子理中湯夫痢雖有赤白之分總是暑而成初下皆宜利之而以川黃連為君川連能去心經伏熱亦去脾經濕熱條芩去大腸經熱主治下痢膿血白芍和脾血而治腹痛川歸益血止痛檳榔治滯氣而除後重木香枳殼行滯寬中山楂麥芽消導食積或加大黃芒硝小水不利或加滑石木通皆治痢之通劑也白痢濕熱傷氣分用白朮益脾氣陳皮理滯氣茯苓滑石滲濕熱之氣久則胃弱氣虛必以四君子加黃芩為主劑赤痢濕熱傷血分用歸芎養血地榆涼血桃仁活血中之滯久亦胃弱氣虛必以四物加阿膠為主劑如赤白相兼氣血俱傷用四君子陳皮以理氣四物桃仁以理血小便赤澀者小腸經濕熱勝也用木通澤瀉梔子以利之大便燥澀者大腸經濕熱甚也用蒼朮槐花條芩以清之又有久痢後重不除此大腸下墜氣虛下陷也用升麻參耆以提其氣活血行氣之劑斷不可用亦有寒痢者用理中及薑桂之類如諸劑調理日久不愈此屬虛寒脫滑可於溫寒補虛中復加龍骨赤石脂栗殼烏梅訶子肉果收澀之藥而自愈矣附方柴苓湯柴胡茯苓半夏黃芩白朮澤瀉人參枳實甘草大承氣湯大黃厚朴枳實芒硝調胃承氣湯芒硝大黃甘草河間芍藥湯木香芍藥黃芩黃連大黃檳榔桂枝歸尾甘草天水散滑石六兩水飛甘草一兩為末芍藥黃連湯黃連當歸芍藥甘草四物湯熟地當歸芍藥川芎黃連阿膠丸黃連阿膠茯苓桃仁承氣湯大黃桂枝芒硝桃仁甘草阿膠梅連丸阿膠赤茯苓烏梅白芍黃柏黃連乾薑當歸人參敗毒湯柴胡桔梗人參羌活獨活川芎茯苓枳殼前胡甘草理中湯見驚風症加附子又方赤芍三錢山楂肉三錢甘草一錢半木香七分檳榔一錢人參白朮散人參白朮茯苓桔梗黃連藿香苡仁砂仁山藥扁豆甘草一説治腹痛老薑細茶各三錢煎服奇方紅菱四支連殼打碎老薑三錢加酒一鍾燉熟和紅糖服即止治痢久不愈者用白蘿蔔取汁一鍾蜜一鍾共煎滾調勻服立止又奇方落帚葉煎湯連葉服即愈又旱蓮汁和酒飲立愈又王瓜藤灰酒下即愈又服八灰散即止八灰散棕灰發灰蓮蓬艾當歸頭松皮側柏椿根皮又奇方王瓜藤連莖葉經霜者曬乾作灰出火毒以香油調納臍中即愈又金華散專治紅白痢久不愈者服之神效椿根白皮二兩用臭者去粗皮向東南取松花三錢地榆二錢乾荷葉二錢貼水陰乾用其中段為細末每服三分紅痢蜜調白痢黑糖調紅白蜜糖調後加溫湯少許空心服忌麵食葷腥油膩物附脫肛總括肛門露出久難收再感風傷事可憂況是先傳脾胃弱更詳冷熱易為瘳夫肺與大腸相為表裡肛者大腸之魄門是也巢氏曰實熱則為大便閉結虛寒則肛門脫出有因痢久裡急後重努力肛開為外風所吹或伏暑作瀉腸滑不禁或稟賦怯弱易於感冷亦令大腸虛脫凡小兒所患瀉病皆因暑濕風熱乘脾胃虛而得蓋風屬木肝木勝則制土土主脾胃虛而受制又濕喜傷脾因虛受濕不能分別清濁水穀交雜則為洞瀉洞瀉既久大腸亦虛大腸乃手陽明燥金土虛不能生金金氣既虛則傳送之道亦虛或又為風冷所襲致肛門脫而不收法當補脾溫胃宜補中益氣湯倍加木香白芍粟殼砂仁地榆之類外用伏龍肝敷之及萆麻膏貼囟門使引上令其自收如收盡仍以水洗去其膏及有濕熱積滯於大腸未經疏蕩亦成此疾宜芍藥湯少加大黃以瀉其積滯之氣痢止而肛不復脫矣外宜蟠龍散敷之大凡手足指熱者屬熱指寒者屬虛亦是一看法久痢不止將核桃殼燒灰存性為末看大小酒服之或用山楂為末紅者白糖拌白者紅糖拌亦妙大抵治痢疾一二日元氣未虛治宜疏通積滯此通因通用之法三四日後不可疏通恐元氣虛也當清熱解毒調養脾胃為主附方補中益氣湯白朮當歸人參陳皮柴胡升麻黃耆甘草伏龍肝治陰症伏龍肝一兩鱉頭骨一錢半百藥煎二錢共焙為末用一錢至三錢煎紫蘇湯待溫洗和清油調敷患處先用荊芥生蔥五倍子末煎水候溫浴之輕與擦乾然後敷藥芍藥湯白芍澤瀉薄桂甘草蟠龍散乾地龍蟠如錢樣者佳一兩風化朴硝二錢淨方香附荊芥皂角煎水淨又方五倍末朴硝大腹皮煎水淨以赤石脂末之摻芭蕉葉托上亦好咳嗽附龜胸龜背總括咳嗽雖然分冷熱連聲因肺感風寒眼浮痰盛喉中響戲水多因汗未乾脈法關上脈微為咳浮緩為傷風脈緊為寒嗽浮直者生浮軟者死內經曰五臟六腑皆令人咳非獨肺也蓋皮毛者肺之合也皮毛先受邪氣邪氣聽從其合也五臟之咳久乃移於六腑又病機要云咳謂無痰而有聲肺氣傷而不清也嗽謂無聲而有痰脾濕動而生痰也咳嗽謂有聲有痰因傷肺氣動於脾濕故咳而嗽也經又云秋傷於濕冬必咳嗽大抵素秋之氣宜清而肅今反動之則氣上衝而為咳嗽甚則動於脾濕而為痰也夫肺居至高之上主持諸氣屬金而畏火者也清虛高潔覆蓋五臟乾金之象外主皮毛司腠理開合護衛一身如天之覆物體之至輕清者也或外因六淫之邪相侵內因七情之氣相忤則肺金受傷而清純之氣擾亂妄動為火為痰咳嗽之病從茲作矣小兒日內咳嗽痰壅睡中不寧亦因産後感風而得但不可過用發散之劑先解表後服惺惺散小兒汗出未乾遽爾戲水亦至傷風咳嗽外症眼胞微浮額陷痰鳴亦宜疏風化痰解利邪熱小柴胡湯可也錢仲陽曰嗽者肺感微寒八九月間肺氣正旺若面赤身熱其病為實宜葶藶丸下之久嗽不宜下若在冬月則傷風嗽宜麻黃湯汗之面赤飲水咳嗽吐膿痰咽喉不利者以甘桔湯清之先咳後喘面腫身熱肺氣盛也以瀉白散平之嗽而吐痰涎乳者以白餅子下之潔古云嗽而兩脅痛者屬肝經用小柴胡湯咳而嘔苦水者屬膽經用黃芩半夏生薑湯咳而喉中如梗者屬心經用甘桔湯咳而失氣者屬小腸用芍藥甘草湯咳而右脅痛者屬脾經用升麻湯咳而嘔大蟲者屬胃經用烏梅丸咳而喘息吐血者屬肺經用麻黃湯咳而遺尿者屬膀胱經用茯苓甘草湯咳而腹滿不欲食面腫氣逆者屬三焦用異功散若咳嗽流涕外邪傷肺也先用參蘇飲喘嗽面赤心火刑肺也用人參平肺散及六味地黃丸嗽而吐青緑水肝木乘脾也用異功散加柴胡桔梗咳而吐痰乳脾肺氣傷也用六君子湯加桔梗若嗽吐膿痰者熱蘊於肺而成肺癰也用桔梗湯嗽而涕吐帶血甚則血溢宜清金降火此火乘肺也凡風邪外傷法當先表散而後實腠理其用下藥非邪傳於內及胃有實熱者不宜輕用面色白脈短澀者肺之本症也易治面色赤脈洪數者火刑金也難治附龜胸龜背龜胸之候因風痰停飲聚積心胸再感風熱肺為諸臟之華蓋居於膈上水氣泛溢則肺為之浮日久凝而為痰停滯心胸兼以風痰內發其外症唇紅面赤咳嗽喘促致胸高如覆掌名曰龜胸其乳母多食五辛亦能成此疾先服寬氣飲入薑汁蔥湯調服次清肺飲如意膏為治如服藥後目睛直視痰涎上壅兼以發搐則難治矣龜背者初生嬰孩或未滿半周客風吹脊傳入髓故感此症錢仲陽雖有龜尿點背之言然終成痼疾者多矣批丹溪曰咳嗽遇冬而發者寒包熱也解表熱自除有咳至極時嘔吐乳食與痰出盡方定此名風痰壅盛肝木克脾土宜以南星半夏陳皮天麻白附子殭蠶之類風寒嗽者鼻塞聲重畏寒火嗽者有聲痰少面赤癆嗽者盜汗夜多寒熱肺脹嗽者動嗽則喘滿氣急痰嗽者動便有痰聲痰出嗽止咳分春夏與秋冬痰癆火食及寒風俱用二陳來作主生薑五片最先鋒春杏芍芩柴五味夏苓支柏五味攻秋添蒼芩五味杏桂枝蘇葉細辛冬癆用四物紫菀杏五味人參及款冬嗽久除嗽加粟殼干嗽之時難奏功上夜屬陰加四物黃柏知母五味宗五更嗽發屬食積神麯山楂枳實從嗽得出時加半夏不出去半貝母逢附方小柴胡湯見諸吐症內葶藶丸肺實氣喘用葶藶子隔紙略炒防己黑豆炒杏仁面炒去皮尖搗膏一兩為末取蒸棗肉搗和為丸麻子大每服五六丸薑湯下麻黃湯冬用桂枝杏仁麻黃甘草甘桔湯咽喉熱痛用桔梗甘草瀉白散肺有熱氣喘用地骨皮桑白皮甘草白餅子下痰用見驚風症內黃芩半夏生薑湯黃芩芍藥半夏生薑甘草芍藥甘草湯芍藥三錢甘草二錢葛根升麻升麻湯升麻芍藥葛根甘草烏梅丸蜀椒細辛附子制桂枝人參當歸黃柏乾薑茯苓甘草湯茯苓二錢甘草一錢桂枝二錢半生薑五片異功散見驚風症內參蘇飲紫蘇前胡陳皮半夏乾葛茯苓枳殼桔梗人參甘草人參平肺散六味地黃丸熟地丹皮茯苓山藥澤瀉山茱萸六君子湯見瘧疾症內寬氣飲見驚風症內清肺飲人參柴胡杏仁桔梗赤芍荊芥枳殼桑皮五味麻黃旋覆花如意膏半夏南星俱薑製蜜丸用薑蜜送下傷積附傷食總括頭痛身熱腹微脹足冷神昏只愛眠因食所傷脾氣弱下宜遲緩表為先脈法右手氣口脈大於人迎一二倍為傷食宿食不消則右關脈沉而滑虎口脈紋而黃色為脾家有積小兒脈沉者為乳不消內經曰飲食自倍脾胃乃傷小兒所患積症皆因乳哺不節過食生冷堅硬之物脾胃不能克化停積中脘外為風寒所傷或因夜臥失蓋致頭疼面黃身熱眼胞微腫腹痛膨脹足冷肚熱喜睡神昏不思飲食或嘔或噦口噫酸氣大便酸臭此皆為積所傷有食飽傷脾脾氣稍虛拘留難化停而不去遂成其積積敗為痢仁齋曰小兒有積面目黃腫肚熱脹滿覆睡多困叫啼不食或大腸閉澀小便如油或便利不噤糞白而酸臭皆積症也然有乳積食積氣積驚積須當辨明吐乳瀉乳其氣酸臭此由啼叫未已以乳與兒停積不化是為乳積肚皮帶熱渴瀉或嘔此由飲食無度多餐過飽飽後即睡得之是為食積腹痛叫啼痢如蟹渤此因觸忤其氣營衛不和淹涎日久得之是為氣積有時時瀉下清水如生草汁是受驚而後有積煩悶啾唧常似生嗔名為驚積因受病日久而積成之或額上有汗喘息煩渴潮熱往來肚腹有熱睡中覺腹內有物跳動者是也然積有虛有實虛則渾身微熱不思飲食昏昧神緩抱起如睡實則吐熱糞閉囟腫喉塞痰壅涎鳴熱毒發瘡推此可見矣其傷乳傷食而身熱者惟肚腹之熱為甚人知傷積足冷肚熱糞酸極臭而夜間有熱傷積之明驗人所不知也其或變症面黑瀉黑久瀉未已肚腹脹滿氣出粗大手心生瘡瘦弱柔軟皆不可療小兒消積多用青皮然青皮最能發汗有汗者切勿多與之小兒諸疾皆乳食無度過於傷飽以致不能克化留而成積初得之時不問乳積食積氣積進以消積丸其驚以辰砂膏或青龍丸量輕重而疏導之仍以調氣和脾胃取愈蓋脾胃已傷又以藥傷之使營運之氣減削食愈難消故致深劇五常政大論曰大毒治病十去其六小毒治病十去其七常毒治病十去其八無毒治病十去其九穀肉果瓜菜食養之物必無使過之傷其正也凡人以胃氣為本惟治病亦然小兒脾胃有虛有實虛則嘔吐不食之症實則痞滿內實之症虛者益之實者損之欲得其平則可矣胃虛用木香丁皮厚朴肉豆蔻之類胃實用桔梗枳殼柴胡大黃等劑若夫胃中停寒則停薑官桂丁香又不可缺貴在酌量但以大小分劑與之夫是謂之平蓋心者脾之母進食不止於和脾益火能生土當以心藥入於脾胃中庶幾得之古人進食方劑多用益智者此也附傷食凡小兒飲食停滯中焦不化而發熱者必惡食也或暖氣作酸或惡聞食味或欲吐不吐或吐之不盡或噁心或氣短痞悶或胃口作疼或心下痞滿按之則痛此皆停食之候也若感寒邪者則左手人迎左關氣口右關俱大外症頭痛惡寒拘急中脘痞滿或吐或嘔或痛者以藿香正氣散或人參養胃湯或木香砂仁之類若肉食不化必加棠毬子即山楂肉末麵食不化者加神麯麥芽生冷肉食不化者加草果砂仁枳實青皮主之如食在胃口上未入於胃乃可吐之不吐則消導之待食下胃變化糟粕外症已解乃可下其食也宜三黃枳實丸熱多者大柴胡湯如無外感但只傷食者方可下之凡治夾食傷寒不可先攻其食且先發散寒邪次可消導之也附方消積丸白朮陳皮青皮益智神麯三稜丁香茴香辰砂膏硼砂辰砂真珠全蠍馬牙硝各一錢麝香一匙青龍丸青黛茯神蘆薈南星麝香輕粉全蠍硃砂為衣薄荷湯下藿香正氣散藿香厚朴白芷半夏桔梗茯苓紫蘇白朮陳皮大腹皮甘草人參養胃湯人參半夏陳皮茯苓蒼朮厚朴藿香肉果三黃枳實丸枳實黃連大黃陳皮白朮黃芩草豆蔻大柴胡湯見瘧疾症內傷寒總括傷寒之候有多般一概推詳便覺難面目俱紅時噴涕氣粗身熱是傷寒脈法難經曰傷寒之脈陰陽俱盛而緊澀浮澀而緊為傷寒傷寒傷風何以判寒脈緊澀風浮緩傷寒惡寒風惡風傷風自汗寒無汗陽屬膀胱並胃膽陰居脾腎更連肝浮長弦細沉微緩脈症先將表裡看凡論脈息若早晨小至晚反大病為未愈若早晨大至晚反小病欲愈所謂大則病進小則病退也內經曰人之傷於寒也則為病熱熱雖甚不死若日傳二經病名兩感兩感於寒者則不免於死矣第大人與小兒病原治法雖相去不遠然用藥不可太熱蓋小兒系純陽之體仲景云春氣融和夏氣炎熱秋氣清涼冬氣凜冽此四時正氣之序也冬時嚴寒萬類深藏君子固密不傷於寒觸冒之者乃名傷寒其傷於四時之氣皆能為病冬受寒毒之氣其即時而病者頭疼身疼肌熱惡寒此為正傷寒自批傷寒一日在太陽腰脊頭痛不可當二日陽明胃家熱目痛鼻乾眠不得三日少陽傳膽經胸脅疼痛耳聾鳴四日太陰脾受病腹滿咽乾傳裡應五日少陰腎家病口燥舌乾煩渴定六日厥陰肝經盡舌卷囊縮傳裡症其不即時病者寒毒藏於肌膚之間致春夏陽氣發生則寒毒於陽氣相搏於榮衛之間其病與冬時即病無異但至春而發名曰瘟病至夏而發名曰熱病陽熱未盛寒為所制故病為溫陽熱已盛寒不能制故病為熱此均謂之傷寒也又春時應暖而反寒夏應熱而反冷秋應涼而反熱冬應寒而反溫此非時而有其氣病無長幼率相似者此俗謂之天行是也小兒感冒寒邪者多因乳母解脫衣服飲食起居不避風寒或夏秋之間天氣盛熱乳母當風取涼致風寒之氣傷之是以亦病傷寒也然小兒是患此口不能言其致病之由脈不能診其必然之理但只煩啼發熱而已視之其不可盡心乎故初得之時以虎口指紋之紅色驗之長而童稚則以一指按其三關按左手人迎之緊盛而斷之斯得之矣陶節庵曰凡症有頭痛惡寒皆是傷寒無則皆非也何則傷寒惡寒傷食惡食理固然也惟在冬時惡寒殊甚蓋冬時為正傷寒寒風猛冽觸之者惡寒殊甚其餘時月雖惡寒亦微也蓋冬時之氣寒腠理微密非辛溫不可故以桂枝等藥治之然風與寒常相因寒則傷榮惡寒頭痛脈浮緊而無汗則用麻黃湯開發腠理以散邪得汗即愈風則傷衛頭痛惡風脈浮緩而自汗則用桂枝湯先塞腠理以發邪汗止即愈經曰甘辛發散為陽者是也若夫榮衛俱傷又非此二湯所能治也須大青龍湯然此湯太峻亦有可代之者其非冬時有惡寒頭痛之症宜羌活沖和湯辛涼之劑兼表裡以和之兼可代大青龍湯也過此則少陽陽明二經在乎半表半裡肌肉之間脈亦不沉不浮外症至陽明則有咽痛鼻乾不得眠之症脈似洪而長以葛根升麻湯治之在少陽則心脅痛而耳聾脈見弦數以小柴胡湯加減而和解之本方有加減法此二經不從標本從乎中也余常以小柴胡湯加葛根芍藥治少陽陽明俱病如拾草芥過此不已則傳陽明之本為入里矣便作實熱治之其外症悉罷謂無頭痛惡寒脈見沉實不浮譫語惡熱六七日不大便口燥咽乾而渴輕則大柴胡湯重則大承氣湯選用傷寒蘊要曰凡小兒傷寒則怕寒拘急發熱合為一翕翕然在表晝夜不止直待汗出方解其惡寒惡風必偎人藏身引衣密隱鼻塞多涕是為表症宜微汗之解肌湯蕭氏小青龍湯敗毒散之類惡熱內實者必出頭露面揚手擲足掀衣氣粗煩渴燥糞是為里症宜疏利之小柴胡湯四順飲之類若頭額冷手足涼口氣冷面色黯淡瀉痢青白是為陰症宜與溫之五積散理中湯之類重者四逆湯主之夾驚者因驚之時而又感風邪或因傷寒發熱以致熱極生風是熱乘於心心主血脈心神易動為熱所乘故發搐也慎勿與治驚之劑宜疏解之王氏薄荷散人參羌活散之類甚者抱龍丸主之夾食者先傷於寒後傷於食或先傷於食後傷於寒以致發熱氣粗口氣噯氣肚熱腹脹上熱下冷或大便酸醙並宜解散次與消導甚則推蕩之先用敗毒散後用藿香正氣散加神麯麥芽棠毬子砂仁香附之類如不愈以大柴胡湯下之湯氏曰大凡小兒傷寒治法周歲以前熱輕者服惺惺散周歲以後須急解表微汗為妙在一晝夜得汗方保無虞今之醫士多不表汗致令五六日不除入於經絡搏於血氣變傳多症或生驚風漸致危篤傷生害命可不慎乎然表裡不可不知蓋表裡不分汗下差誤古人云桂枝下咽陽盛即斃承氣入胃陰盛乃亡傷寒有表症有里症有半在表半在裡症有表裡二症俱見有無表裡症然表者宜汗有里者宜下在半表半裡者宜和解表裡俱見隨症滲泄無表裡者大柴胡湯下之其表症者發熱惡寒身首俱痛無汗脈浮項強腰脊痛此足太陽膀胱經受病也宜汗之然傷寒發表當隨病輕重而汗之頭痛發熱兼驚只用蔥白湯主之甚則麻黃各半湯解肌湯之類其表症惡熱不惡寒手足心並腋下濈濈汗出胃中乾涸燥糞細聚潮熱大便結小便如常腹滿而喘煩躁而渴脈實而滑內熱而譫語此屬足陽明胃經也宜下之可用大小承氣並四順飲洗心散斟酌而用之其在半表半裡者心下滿口不欲食大便堅脈沉細是里症當下其人頭汗出微惡寒手足冷即當汗此兩症俱見者仲景所謂半在表半在裡也小柴胡湯主之太陽病不解傳入少陽脅下鞕滿乾嘔不能食往來寒熱尚未吐下診其脈弦緊者小柴胡湯主之此屬足少陽膽經也宜和解之其表裡兩症俱見者病人脈浮而大是表症當汗其人發熱煩渴小便赤是里症當下此是表裡症俱見五苓散主之又傷寒不大便六七日頭痛有熱者是里症當下其人小便清者知不在裡仍在表須當發汗此是兩症俱見即未可下宜與桂枝湯又太陽病醫反下之因而腹痛是有表復有里仲景用桂枝加芍藥湯痛甚者桂枝加大黃湯或腹滿時痛尺寸脈俱沉者此屬足太陰脾經也自利不渴當溫之宜四逆湯理中湯其無表裡症者傷寒四五日以後及至過經無表裡症又無里症未可下但非汗症亦非下症者皆用小柴胡湯隨症加減用之至十餘日外用小柴胡湯不愈者若大便堅看可下則用大柴胡湯下之仲景云六七日目中了了睛不和無表裡症大便難身微熱此謂實也宜當下大承氣湯若不渴不口燥舌乾而脈沉者急溫之宜四逆湯此屬足少陰腎經也其表裡寒熱者身大熱而反欲得衣熱在皮膚寒在骨髓也宜先與溫膽湯寒已次以小柴胡湯加桂以治其表又身大寒而反不欲近衣寒在皮膚熱在骨髓也宜先與白虎湯加人參熱除次以桂枝麻黃各半湯又厥陰症脈浮緩者必囊不縮外症必發熱惡寒似瘧為欲愈宜桂枝麻黃各半湯若脈尺寸俱沉短者必囊縮毒氣入臟宜承氣湯下之厥陰病其脈微浮為欲愈不浮為未愈宜小建中湯此屬足厥陰肝經也然以表裡症內似三陰三陽之症而疏於各症之下非所以盡備六經之大法也當以活人書傷寒論為主其瘧症亦與大方同其暑症玉露散主之亦與大方同第劑分大小耳口議有脫甲散大能散熱扶表真良方也附方麻黃湯見咳嗽症內桂枝湯見驚風症內大青龍湯桂枝麻黃石膏杏仁甘草生薑大棗羌活沖和湯蒼朮白芷細辛生地羌活防風茯苓川芎甘草葛根升麻湯升麻葛根芍藥甘草小柴胡湯見諸吐症內大柴胡湯見瘧疾症內大承氣湯見痢疾症內解肌湯乾葛桂枝芍藥麻黃黃芩甘草小青龍湯麻黃赤芍半夏細辛乾薑桂枝五味甘草敗毒散見痢疾症內或去茯苓用黃芩四順湯當歸大黃赤芍甘草五積散麻黃蒼朮陳皮白芷人參茯苓桂枝桔梗半夏白芍當歸厚朴川芎乾薑枳殼甘草理中湯見驚風症內四逆湯附子乾薑甘草炙薄荷散金櫻葛根薄荷甘草骨碎補人參羌活散人參羌活赤芍赤茯苓柴胡前胡獨活川芎桔梗甘草蒼朮枳殼抱龍丸膽星天竹黃雄黃硃砂麝香甘草為丸藿香正氣散見積滯症內惺惺散見諸吐症內蔥白湯葛根芍藥知母川芎桂枝麻黃各半湯見瘧疾症內小承氣湯大黃枳實厚朴洗心散麻黃大黃白芍當歸白朮荊芥甘草小柴胡湯見諸吐症內五苓散見驚風症內桂枝湯風驚風症內桂枝芍藥湯桂枝乾葛芍藥大棗甘草桂枝大黃湯桂枝芍藥大黃甘草溫膽湯竹茹枳實半夏陳皮甘草生薑白虎湯石膏知母人參甘草粳米小建中湯膠飴桂枝芍藥甘草生薑大棗玉露散見霍亂症內脫甲散柴胡當歸膽草茯苓人參知母川芎甘草熱症總括發熱無過先有餘次傳不足始成虛身中有熱先除熱熱里逢虛先補虛脈法脈沉而數者骨間有熱欲以腹按清冷也小兒八九至為發熱浮大數風熱有力為實無力為虛內經曰陽勝則外熱陽虛則外寒陰勝則內寒陰虛則內熱陰陽相勝則寒熱往來又曰陽不足則先寒後熱陰不足則先熱後寒陰陽不歸其分則寒熱交爭也又曰肝熱病者左頰先赤心熱病者額先赤脾熱病者鼻先赤肺熱病者右頰先赤腎熱病者頤先赤病雖未發其症已先見於面矣自批治六經熱方治心熱用瀉心湯治肝熱用瀉青丸治脾熱用瀉黃丸治肺熱用瀉白散治腎熱用滋腎地黃丸治小腸熱用導赤散夫熱有輕重不同有所謂翕翕發熱者若合羽取覆其熱在外屬表乃風寒客於皮膚陽氣拂鬱所致宜發汗而散之有所謂蒸蒸發熱者若熏蒸之氣其熱在內屬裡乃陽氣下陷而入陰中也法當攻下以滌之表症未罷邪氣傳裡里未作實是為半表半裡之間則表裡俱發熱而又輕於里純在表也發熱惡寒發於陽也無熱惡寒發於陰也夫小兒生稟純陽血氣壯實五臟易生熱也熱各有不同故治亦不同焉潮熱者或午時發熱或日晡發熱發時如潮水之應不差也傷寒論云潮熱實熱也當利大便若虛症亦能潮熱必須進以溫補之劑脈實者宜大柴胡下之脈虛浮數者百解散汗之若發熱而嘔者小柴胡湯主之驚熱者遍身發熱面青自汗心悸不寧脈數煩躁顛叫恍惚以錢氏驚風丸安神丸主之夜熱者但夜間發熱是陰中有陽邪也宜進元戎四物二連湯但夜間發熱症候多端先要辨其虛實明其表裡方可投藥若概用元戎湯不妥餘熱者謂寒邪未盡之遺熱也仁齋曰傷寒汗下後而熱又來乃表裡俱虛氣不歸元陽浮於外不可再用涼藥蓋熱去則寒起叔和解之詳矣宜和胃氣使陽氣收斂歸內其熱自止宜參苓白朮散主之食熱者手心熱肚腹先熱噯氣吐乳大便酸臭宜下積丸疳症者形瘦多渴骨蒸盜汗瀉泄無常肚大腳弱是也宜胡黃連之類當參看疳積門調治之壯熱者一向不止表裡俱熱煩渴躁喘氣粗甚則發驚癇也宜火府丹通聖散煩熱者心煩不安五心煩熱小便赤澀宜一粒金丹主之積熱者眼胞浮腫面黃足冷發熱從頭至肚為甚治法詳傷積論中風熱者呵欠面赤風邪客於皮毛入於臟腑則惡風發熱目澀多睡陽氣有餘身熱無汗陰氣有餘身寒有汗陰陽有餘無汗而寒素問曰汗出而身熱者風熱也宜清解散犀角丸主之虛熱者因病後發熱無時面色青白困倦少力瀉泄多尿虛汗自出恍恍神慢者是也凡病久則血氣虛氣虛則發厥血虛則發熱氣血皆虛則手足厥而身熱也宜服錢氏白朮散或四君子湯甚者宜行從治之法以薑附之類佐之經所謂甘溫除大熱是也變蒸熱者溫溫微熱氣粗驚少吮乳瀉黃上唇尖有水珠狀是也不必服藥如兼他症者當以所感之候略為和解癖熱者涎嗽飲水由乳食不消伏結於中致成癖塊也詳在積聚門中矣寒熱者症如瘧狀陰陽相勝也詳瘧症篇血熱者全嬰方云已午間熱遇夜則涼是也服六合湯麻痘熱者面赤足冷身發壯熱呵欠煩悶咳嗽腰疼嘔吐作驚腹痛自痢中指鼻尖耳冷是也附方瀉心湯黃連一兩為末清水調服五分瀉青丸見驚風症內瀉黃丸藿香山梔石膏防風甘草瀉白散見咳嗽症內滋腎地黃丸黃柏知母桂枝導赤散見驚風症內大柴胡湯見瘧疾症內小柴胡湯見諸吐症內百解散乾葛麻黃黃芩桂枝赤芍藥甘草涼驚丸黃連防風川芎薄荷大黃膽草蜜丸青黛為衣安神丸見疳積症內元戎四物二連湯當歸芍藥川芎黃連生地胡黃連參苓白朮散見諸瀉症內下積丸丁香砂仁川巴豆使君子火府丹生地木通黃芩甘草通聖散防風荊芥當歸芍藥薄荷黃芩連翹石膏滑石川芎麻黃桔梗朴硝山梔大黃白朮甘草一粒金丹人參犀角琥珀玳瑁防風茯苓冰片硃砂寒水石甘草米糊為丸金箔為衣麥冬湯下清解散防風天麻前胡茯苓桔梗枳殼細辛柴胡川芎甘草犀角丸犀角珍珠防風羌活茯神大黃天竺黃硃砂甘草立夏前宜服錢氏白朮散人參白朮茯苓藿香乾葛木香甘草四君子湯見驚風症內六合湯當歸川芎大黃熟地痧症總括斑症總言因胃熱赤生黑死分明別忽如錦片出肌膚濕毒發時別兩脅脈法脈陽浮而數陰實而大內經曰少陰所致為瘍疹夫少陰所致者君火有餘熱令火行戊子戊午之歲也在人則心主之心火太過則制己所勝而燒灼肺金又肺主皮毛故紅色如錦見於皮膚之間心火侮而乘之之色也經又曰疹屬於脾故金鏡録謂毒盛於脾熱流於心乃知心脾肺俱受病而發者其欲出之時腮紅眼赤壯熱憎寒身體疼痛嘔吐泄瀉咳嗽煩渴是其候也當服開豁腠理湯使之易出如頭面愈多鮮明勻淨精神爽朗吉之兆也服前藥即愈矣若痧色紫紅乾燥暗晦或未出透身熱煩悶聲啞喘急隱隱不出出而復隱此危急之兆也批看時氣加之有云火熱入內血化為斑急將前方加炒黑麻黃羌活之類發之如不復出或喘更甚此不治之症也活幼心書曰斑症有二有瘟毒發斑有胃爛發斑瘟毒發斑者其癮疹如錦紋片出於兩腋之下兩腋者氣之道路故瘟毒隨氣之道路而先出其症咳嗽煩悶或嘔清水此因冬時感冒寒毒停於肌肉之間至春陽氣發動而行於外名為瘟毒發斑以百解散及牛蒡湯加陳皮黃連之類胃爛發斑初因傷寒下早熱毒乘虛入里乃當下而不下亦致熱毒內蒸於胃胃受熱毒則發於皮膚斑之赤者可療黑者十死一生治法同前其病大便堅燥不可輕用藥下之或用蜜煎豬膽導之則自來矣如微瀉者不必治之正假此以泄熱毒也若痧發後瀉痢不止此又熱毒下陷之故當以五苓散去桂加芩連芍藥木通之類毒解熱退瀉痢自止不可用燥澀溫補之劑古人云可汗不可下可表不可補是也痧後壯熱氣促不止者此餘毒留連未盡也須用解火清金之劑以竹葉石膏門冬知母芩連玄參桔梗陳皮枳殼天花粉牛蒡之類痧後咳嗽不止者二陳加栝蔞桔梗玄參黃芩治之渴則門冬花粉喘則蘇子桑皮可也痧出過三日後不沒者此內有實熱也加清利之藥則自消矣四物湯加芩連牛蒡之類凡出痧之時大忌生冷葷腥之食風寒水濕之氣苟有不謹最為深患間有犯之而獲愈者此內稟之氣實外感之邪輕耳余雖不敏驗之屢矣當慎守此戒有一種初出淡紅潤色酷似痘疹但粒頭尖小為異此為赤痘有初出尖小而頭白光亮有清水此為水痘此二者皆屬心火流於脾肺最為易出易靨極稱輕症但恐變瘡瘍膿水潰壞此皆不避風絶葷耳以四物加荊芥防風芩連之類附方開豁腠理湯陳皮天花粉防風荊芥桔梗枳殼前胡乾葛紫蘇羌活甘草升麻百解散見熱症內牛蒡湯牛蒡大黃防風荊芥薄荷甘草五苓散見驚風症內二陳湯見諸吐症內四物湯見痢疾症內喘症附齁䶎總括喘為惡候古今傳氣急形症看須詳白虎梅花自解急一服可散病必痊脈法脈浮遲滑人生活澀數微虛命必傾脈宜浮遲不宜急脈數有熱喘咳吐血上氣不得臥者死上氣面浮腫有息脈浮大不治又加刺尤甚內經曰諸逆衝上皆屬於火又曰起居如故而息有音者此肺之脈絡逆也河間曰火氣甚為夏熱衰為冬寒故病寒則息衰而氣微病熱則氣盛而息粗又寒水為陰主乎遲緩熱火為陽主乎急數是以寒則息遲氣微熱則息數氣粗而為喘也大抵哮以聲響名喘以氣息言促以氣短論也夫喘促喉中如水雞聲者謂之哮氣促而連續不能以息者謂之喘雖然未有不由痰火內郁風寒外來而致者有傷寒肺氣壅盛發喘者是表不解也以麻黃杏仁甘草石膏之類辨真寒熱而治之有傷風咳嗽肺虛而發喘者以麻黃杏仁甘草三物湯加減而治之其因驚發喘逆觸心肺暴急張口虛煩神困則以化痰定喘丸主之又有哮吼喘者喉間如拽鋸之聲可服梅花飲子其食鹽酸而喘者啖之以生豆腐有熱者治之以清涼定喘之劑凡喘與脹二症相因必皆小便不利喘則必生脹脹必生喘要分標本先後如先喘而後脹者主乎肺先脹而後喘者主乎脾蓋肺金司降外主皮毛肺朝百脈通調水道下輸膀胱肺既受邪則失降下之令故小便漸短致水溢皮膚而生脹滿此則喘為本而脹為標治當清金降火為主而行水次之脾土惡濕而主肌肉土能剋木若脾土受傷不能制水則水溢妄行浸漬肌肉水既上溢則邪反侵肺氣不能降而生喘矣此則脹為本而喘為標治當實脾行水為主而清金次之若肺症而用燥脾之藥則金燥而喘愈甚脾病而用清金之藥則脾寒而脹益增矣可不辨哉丹溪曰久病發喘故用人參阿膠五味新病氣實故用桑白皮麻黃杏仁有痰者凡喘便有痰聲降痰為先有氣喘者呼吸急促而無痰聲降氣為主有胃虛者抬肩擷肚喘而不休和胃消痰為主有火痰者乍進乍退得食則減食已則喘降火清金為主上氣燥而喘者為肺脹欲作風水發汗則愈一云咳而上氣肺脹其脈沉心下有水氣也批喘有三熱喘發於夏不發於冬冷喘則遇冬而發水喘停飲胸膈滿悶腳先腫也錢仲陽曰腫脹內有大喘者重也何以然腎水盛而克退脾土土勝心火心又勝肺肺為心克故喘或問曰心刑肺肺本先虛今何喘實曰此有二一者肺水喘此五臟之逆二者腎水氣逆上行旁侵於肺故令大喘此皆難治附方化痰定喘丸雄黃硃砂蟬衣全蠍殭蠶南星白附輕粉梅花飲子硼石芒硝人參甘草辰砂麝香馬牙香冰片末之以瓷器貯好麥門冬湯下氣喘咳嗽桑白皮湯下平時薄荷湯下附齁䶎總括小兒齁䶎為啼時食以酸鹹又乳之因是肺經傷水濕風痰結聚早為醫諸病原來有藥方惟愁齁䶎最難當麻黃桑杏尋蘇子白果冬花更又良甘草黃芩同半夏水煎百沸必須薑病人遇此仙方藥服後方知定喘方齁䶎一症本為寒濕所浸未經發散邪傳心肺變而為熱有熱生風有風生痰痰結不化因循日久成為軟塊圓如豆粒遂成痰母推本其原或啼哭未休遽與乳食或食以酸鹹氣鬱不利致令生痰或節令變遷風寒暑濕襲之或墮水中水入鼻口傳之於肺故痰發而風隨之風痰潮緊氣促而喘乃成痼疾急宜去風化痰以知母湯如意膏治之附方知母湯訶子知母貝母羌活滑石大黃麻黃葶藶甘草如意膏半夏赤茯苓枳殼朴硝用硝風化以生薑打糊為丸緑豆大淡薑湯下痓症總括原來痓病屬膀胱口噤如癇身反張此是傷風感寒濕故分病症有柔剛脈法太陽病發其脈沉而細者為痙內經曰諸痙項強皆屬於濕又曰諸暴強直皆屬於風原病式曰筋徑強直而不柔和也夫肝木屬風而主筋經曰諸暴強直皆屬於風理宜然也其所謂諸痙項強而屬於濕者何與蓋太陽經濕甚則兼風化亢則害承乃制也故知痙之為病濕為本風為標耳其症項背強直腰身反張垂頭瘛瘲口噤不語發熱腹痛鎮日不醒其狀可畏病在足太陽經剛痙無汗柔痙有汗其症面紅眼赤牙緊口張痰涎壅盛昏潰煩渴小便赤澀先譫語而發者此剛痙也其大便滑泄不渴不語先手足冷而發者此柔痙也柔痙為之解肌剛痙為之發汗並以小續命湯加減療之其間一症身體壯熱譫語口乾手足反微寒大便滑泄此為剛柔不反之症無汗乾葛湯主之有汗桂枝加葛根湯主之無汗則用麻黃有汗慎勿用也若痰塞氣盛則南星半夏茯苓以消其痰枳實陳皮紫蘇以順其氣痰消則風止氣順則神清然後察熱之輕重而解利之熱輕者敗毒散熱重者小柴胡湯解之壯熱有汗胸滿口噤咬牙而大便祕者為內實大承氣湯下之後用大柴胡湯解之痙最難痊十救其一過三日則難治自批痙則齊身強直癇則手足冰冷強直反如弓神昏似中風涎流唇口難瘛瘲與癇同剛柔二痙如陰隔陽陽隔陰之類補遺此痙多由亡血筋無所榮故邪得以襲之所以傷寒汗下過多與夫病瘡人及産後致此病者概可見矣內經云太陽所謂強直引背者陽氣太上而爭故強上也出脈解篇足少陰之筋循脊內挾背上至項其病主癇瘈反痙在外者不能俯在內者不能仰故陽病者腰反折不能俯陰病者不能仰治在燔針附方小續命湯麻黃人參黃芩川芎芍藥杏仁防己肉桂防風附子甘草葛根湯見驚風症內敗毒散見痢疾症內小柴胡湯見諸吐症內大承氣湯見痢疾症內大柴胡湯見瘧疾症內癇症總括六種驚癇陰與陽胎狂六畜食留藏痰迷胞絡心神亂至寶安神壯志湯脈法脈弦為風癇脈浮為陽癇脈沉為陰癇凡癲狂脈虛者可治脈實者死又小兒脈緊者是風癇如雀啄者風癇又云驚風三次便為癇虎口脈紋如弓反外者主痰熱夾驚夾食睡臥不穩風癇之症內經曰巨陽之厥則首腫頭重足不能行發為眗僕是蓋陽氣逆亂故令人卒然暴僕而不知人氣復則醒此則癇之類也小兒為風邪所傷驚怪所觸乳哺失節停滯經絡故成癇也其候神氣拂鬱瞪眼直視面目牽引口噤涎流肚腹緊張手足搐掣似生似死或聲或默或項背反張或腰脊強直但四肢柔軟發而時醒者為癇若一身強硬終日不醒則為痙痓矣所謂六畜癇者咽喉風痰所梗聲自如此其理甚明謂之六畜特強名耳又稱五癇病關五臟當察五臟之色觀五臟之症合之心中便了了矣總之為驚風食三種治之驚癇者震駭恐懼打墜積驚其初驚叫犬啼恍惚失魂是也風癇者汗出解脫風邪乘虛其初屈指如計數有熱生風是也食癇者食時得驚停宿結滯其初吐乳不哺大便酸臭或結成乳癖先寒後熱者是也又有陰陽之別陽病脈浮面色光澤病在六腑身體有熱抽掣啼叫是也易治陰病脈沉面色黯晦病在五臟身體無熱手足清冷不抽掣啼叫是也難治或以仰臥屬陽覆臥屬陰亦可參驗蓋陽症不可用溫陰症不可用寒也有狂癇者亦屬陽症難經曰重陽則狂至長成小兒才發時妄言不食而歌甚則逾牆上屋棄衣而走或一日或二日方醒始因冒熱感風風熱內蓄久則風痰壅結上迷心也蓋心乃神之舍偶為邪熱攻逼則神失守而昏亂名曰狂癇當疏風化熱清心平肝鎮心下痰可也癇症皆因神氣未固驚則神不守舍或飲食失節脾胃受傷積為痰飲以致痰迷心竅而作治法當尋火尋痰而治宜服鎮驚清心之劑如痰涎膠固者此藥未能驅逐在上者用吐法吐後方用前藥痰實在裡者亦須下之補遺癲癇即頭眩也痰在膈間則眩微不僕痰溢膈上則眩甚仆倒於地而不知人名曰癲癇徐嗣伯曰大人曰顛小人曰癇其是一疾也但癇症中作聲及醒時吐涎沫醒後又再發時作時止而不休為異耳內經曰人生而有癲疾者名曰胎病此得之在母腹中時其母有所大驚氣上而不下積氣並居故令子驚為顛疾又內經曰春脈者肝也春脈太過為病在外善怒忽眩冒而癲痰脈來弦實而強為太過甚則忽忽善怒眩冒而癲痰附方胎癇正發之劑天將子天麻蠍梢防風辰砂麝香末之乳汁調服安心神之劑菖蒲石膏犀角人參遠志茯苓白蘇子甘草疏熱解表清利之劑獨活羌活天麻人參荊芥防風川芎甘草化風丹治口噤身反目直吐涎人參南星天麻羌活獨活防風川芎荊芥甘草鐵粉丸治癇發無時吐沫心悶龍齒輕粉天麻南星沒藥牛黃麝香豬膽南星散用南星一味濕紙裹煨研末將雄豬膽汁調化連服之牛黃膏南星全蠍蟬蛻殭蠶天麻白附子防風麝香鎮心丹辰砂五錢為細末用豬心血和勻以蒸餅裹劑蒸熟取出為丸如桐子大每服十丸臨臥時服積聚總括積常有處聚無常癥有明形瘕假肌四病所生俱是積身中氣血各遭傷脈法小兒脈伏結為物聚錢氏曰小兒脈沉細為癖積脈經曰脈來細而附骨者積也內經曰積聚留飲痞膈中滿濕積霍亂吐下癥瘕堅硬腹滿皆太陽濕土乃脾胃之氣積聚之根也丹溪曰塊乃有形之物氣不能成形痰與食積死血也在中為痰飲在右為食積在左為死血治法行氣開血為主按此大略之言不可大拘也夫小兒熱氣蘊於胸膈之間留飲聚於腰脅之內由是榮衛不能流行臟腑不得宣通脹滿而致癖結勢使然耳或時發壯熱是也故瘧家中脘多蓄黃水日久而後結癖寒熱不已者以此大抵臟腑和平榮衛調暢則津液自然流通縱使多飲水漿不能為病惟乳食失節三焦關膈以致水漿停滯腸胃不得宣行冷氣搏之乃結聚而成癖也治療之法實則水晶丸下之候所作形症消盡便可攻補兼施經云大積大聚乃可攻也衰其半而止之是也氣弱者先調脾胃如前下之若虛甚用三稜散化癖丸漸消之順適陰陽以平為期然先補後瀉行迎奪之法去其陳寒冷積若面黃唇白發豎肌瘦乃為虛極不可輕下徐徐用藥消化調理為上古人所謂養正則積自除也積症寒熱似瘧肚腹疼痛面黃肌瘦其候未可作瘧治又不可峻取亦不可太補峻取則耗散元氣津液虛損太補則積溫成熱轉生他症治先發散調和中氣緩急次序下之勿傷其胃批久瘧後腹中有塊者宜服藿香正氣散用二陳湯加柴胡葛朴蘇青檳果楂先發散之然後服鱉甲散治之然亦漸加人參之類以保其元氣附方治瘧癖生地白芍陳皮川芎黃芩半夏以上各一錢甘草五分酸炙鱉甲二錢水薑煎服水晶丸南星半夏滑石益智巴豆霜三稜散見諸吐症內化癖丸陳皮莪朮三稜青皮枳殼檳榔白朮丁香細辛廣木香藿香正氣散見傷積症二陳湯見諸吐症鱉甲散見瘧疾症內黃疸總括發黃暑濕蒸脾得內外因分治最良更有胎元生便見切宜多服地黃湯脈法脈沉渴欲飲水小便不利皆發黃凡發黃寸口無脈鼻氣冷並不可治內經曰中央黃色入通於脾又曰諸濕腫滿皆屬於脾土夫黃疸為病肌肉必虛腫而色黃蓋濕熱鬱積於脾胃之中久而不散故土色行於面與肌膚也脾主肌肉肺主皮毛母能令子虛母病而子亦病矣故有諸中者必形諸外其症雖分為五終無寒熱之異丹溪曰同是溫熱如𨠭曲相似正經所謂知其要者一言而終是也外有傷寒熱病陽明內實失於汗下故使濕熱拂鬱內甚令人發黃病也或有疳瀉亦主皮黃髮豎肚青筋肌肉消瘦身必發黃此因疳而有是症仍以疳症治之自愈治疸之法用五苓散倍加菌陳服之或茵陳湯及茯苓滲濕湯之類無不應手獲效又曰濕在上宜汗在下宜利小便或二法並用使上下分消又有小兒生下遍體俱黃惟面目痃厚如金色身發壯熱名為胎黃因未産之前母受極熱母子俱宜服生地黃湯疸有五有黃疸有黃汗有酒疸有谷疸女勞疸附方五苓散見瘧疾症內茵陳湯茵陳蒿一兩梔子三大枚大黃三錢茯苓滲濕湯黃連黃柏梔子防己白松蒼朮青皮陳皮枳實茵陳澤瀉豬苓赤茯苓生地黃湯生地赤芍川芎當歸天花粉白玉散治酒疸黑醜甘遂各五錢水煎五更時服諸血總括九道何為血妄行只因抑鬱熱邪生隨經施治明虛實氣順如常血自行脈法吐血脈滑小弱者生實大者死內經曰清者為榮濁者為衛榮行脈中衛行脈外蓋榮者水穀之精氣也和調於五臟灑陳於六腑故能入於脈夫榮者陰血也所注在心統化在脾藏納在肝宣布在肺輸瀉在腎灌溉一身滋養百脈諸經由此而生育焉然血之所統者氣也氣主眗之血主濡之是以氣行則血行氣止則血止陽生陰長夫倡婦隨之道也若氣一傷則變症百出故妄行則吐衄衰涸則虛勞降下則便紅熱陷則溺赤滲於腸胃則為腸風陰虛陽搏則為崩漏此皆氣有殄戾之乖而血有滲溢之患也養陰者可不先知養陽之道乎巢氏曰吐血者是熱氣盛而血虛熱乘於血血性得熱則流散妄行氣逆則血隨氣上故令吐血也或食飽之後脾胃內冷不能消化忽吐所傷之物氣血相沖因傷肺胃亦令吐血若久嗽氣逆面目浮腫而吐血是肺虛損也服柏枝飲犀角地黃湯衄血者是五臟熱結所為也血隨氣行通流臟腑冷熱調和不失常道無有壅塞亦不流溢血得寒而凝結得熱而流散熱乘於血血隨氣發溢出於鼻竅也又有因傷寒瘟疫諸陽受病不得發越熱毒停聚五臟故從鼻出也龍膽丸柏皮湯膠黃散治之大便下血者是大腸熱結損傷所為也臟氣既傷風邪自入或蓄熱或積冷或濕熱藏於脾胃或疳食傷於臟腑因茲疳熱冷濕互作致動血氣停流於內凝聚無歸滲入腸中故大便下血也或有腹脹冷氣在內攻亦令大便下血又因風冷乘虛客入脾胃或瘀血在於腸間濕毒下如豆汁又疳傷於臟亦能便血若上焦心肺積熱流注於大腸亦令大便下血也亡血者脾熱必渴久則血虛其人必肌體萎黃頭髮不黑宜五倍丸服之溺血者蓋心主血與小腸相合血之流行周遍經絡循環臟腑若熱聚膀胱血滲入胞故小便出血也火府丹服之如實熱用清心蓮子飲虛熱用六味地黃丸批血溢血泄諸蓄妄症其治也當以大黃桃仁行血破瘀之劑折其鋭氣而後區別治之善醫者每治失血蓄妄必先以快藥治之或問失血復下虛何以當曰血既妄行迷失故道不去蓄利以妄為常曷以御之且去者自去生者自生補遺內經曰陽明厥逆喘嗽身熱善驚衄血吐血又曰脾遺熱於肝則為驚衄胞移熱於膀胱則為癃而溺血小兒吐血者榮衛氣逆也榮衛相濟不失常道有所勝則致妄行血水也決東則東決西則西氣之使血其勢然也附方柏枝飲治吐血衄血干柏枝干藕節為末入蜜沸湯調下一方加白芍犀角汁同服犀角地黃湯犀角赤芍丹皮生地龍膽丸止血黃連膽草枯皮湯柏皮山梔甘草膠黃散治口鼻耳出血阿膠一兩蒲黃五錢加生地汁服五倍丸以五倍末之蜜丸緑豆大一歲用十丸米湯空心下火府丹見熱症內清心蓮子飲黃芩門冬骨皮甘草車前子石蓮茯苓黃耆柴胡如虛加人參頭痛附頸項強痛總括頭痛先須辨六經濕痰風火夾邪侵氣虛血少兼寒濕識者尤當審厥真脈法脈經云陽熱則頭疼又曰寸口脈浮中風發熱頭痛脈緊頭痛是傷寒脈緊上寸口者風頭痛脈訣云頭痛短澀應須死浮滑風痰皆易除內經曰寸口脈中短者曰頭痛子和曰頭痛不止夫三陽受病皆胸膈有痰之致蓋指病之壅鬱於上而言也內經曰春氣者病在頭蓋天氣在上知病氣亦升於上也其法當吐謂吐之所以宣達在上之邪仲景云大法春宜吐是也此特治頭痛之一法耳按頭痛之症有自外而生者如風寒暑濕之邪有自內而生者如氣血痰飲之動然人有三陽三陰之異而又皆以風藥治之者總其大體而言之高巔之上惟風可到耳故太陽頭痛者惡風寒脈浮緊痛在巔頂兩額角少陽頭痛者往來寒熱脈弦痛連耳根陽明頭痛者發熱自汗脈浮長大痛連目眥頰齒太陰頭痛者必有痰體重或腹痛脈沉頭重少陰頭痛者足冷氣逆為寒厥脈沉細厥陰頭痛者吐痰沫厥冷脈浮緩痛引目系此六經頭痛多挾外邪者也血虛頭痛者自魚尾上攻頭痛也氣虛頭痛者耳鳴九竅不利也真頭痛者痛甚入連於腦手足寒至節旦發夕死夕發旦死也有厥逆頭痛者所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛也痰厥頭痛者頭苦痛如裂眼黑頭旋噁心煩悶目不敢開如在風雲中此足太陰痰厥頭痛也凡此之類種種不同更參大方究其所因斯無一偏之弊矣丹溪云頭痛大率屬痰甚者火多有可吐者可下者腎虛則頭痛肝虛則頭暈附方太陰經頭痛方藁本川芎羌活獨活麻黃少陽經頭痛方柴胡半夏黃芩人參甘草陽明經頭痛方升麻芍藥乾葛甘草加石膏白芷煎服太陰經頭痛方蒼朮半夏南星川芎蔓荊子少陰經頭痛方麻黃附子細辛厥陰經頭痛方麻黃羌活吳茱萸藁本升麻黃耆黃連黃芩當歸黃柏川芎細辛柴胡半夏紅花蒼朮蔓荊子芎歸湯即四物湯去地黃芍藥一方加柴胡羌活酒芩蔓荊子四君子湯人參白朮茯苓甘草羌活黑附湯麻黃殭蠶黃柏羌活蒼朮防風甘草升麻白芷黃耆黑附子痰厥二陳湯加減陳皮半夏蔓荊子蒼朮南星防風茯苓甘草附頸項強痛總括項病原來風濕居失枕閃挫亦因之左血右痰須記取詳分虛實是靈機內經曰春風生於春病在肝俞在頸項又曰諸頸項強皆屬於濕戴氏曰項痛非是風邪即是氣挫亦有落枕而成痛者宜服和氣之劑亦有挫閃及久睡失枕而致項強不可轉移者此由腎虛不能生肝肝虛無以養筋故機關不利宜服補腎之劑亦有患筋急項不能轉側者此必從足起經言十二經各有筋惟足太陽之經自足至項故也準繩曰頸項強急發熱惡寒之症多因風寒客三陽經也寒搏則筋急風搏則筋弛左多屬血右多屬痰並宜驅邪湯若動則微痛脈弦而數實右為甚此痰熱客三陽經也宜消風豁痰湯若動則微痛脈弦而澀左為甚作血虛邪客太陽陽明經治宜疏風滋血湯附方驅邪湯麻黃桂枝杏仁甘草防風羌活獨活川芎藁本柴胡家葛白芷升麻生薑薄荷水煎服又方多加紫金藤消風豁痰湯黃芩酒炒羌活紅花半夏薑製陳皮白茯苓甘草獨活防風白芷家葛柴胡升麻生薑煎服又方多加紫金藤疏風滋血湯當歸川芎白芍藥熟地黃羌活獨活紅花牛膝防風白芷家葛升麻甘草柴胡桃仁生薑煎服又方多加紫金藤腹痛總括脾經不睦胃家虛邪正交爭氣不舒熱痛面紅並尿赤冷知青白口唇黧脈法陰弦則腹痛弦急則小腹痛尺脈緊則臍小腹痛尺脈伏則小腹痛瘕疝痛心腹痛痛不息脈細小遲者生緊實大者死腹痛脈反大而長者死臍下大痛人中黑者死內經曰寒氣入經則稽遲澀而不行客於脈外則血少客於脈中則氣鬱故卒然而痛云按內經言寒邪外客而痛者甚為詳悉未能盡述後學自宜檢閲原病式曰熱鬱於內則腹滿堅結而痛不可例言為寒也丹溪曰如腹痛欲以物按住者屬虛寒如手不可按者屬實熱痛類不同詳列於後有鎖腸痛者一月後嬰兒忽乳不下咽肚硬如石面赤如朱撮口而哭面青唇黑手足口氣俱冷是也始因斷臍時不緊繫故為風冷所乘症亦危急以白芍藥湯烏梅散投之日久則難愈更參考臍風症內論癥瘕痛乃積久所致亦能成疳此皆榮衛俱虛外則感受風寒內則過傷乳食停滯既久不能克化邪並於陰為癥陰則專靜凝而不移邪並於陽為瘕假物象形動而不息此二症若久而不治亦成脾疳積或兩脅間有塊如石按之則痛不按則輕或面黃肌瘦肚硬而脹及有青筋晝涼夜熱蒸熱無時乳食減少愛吃土泥或大便酸瀉痛則身冷如冰法當調脾養胃用醒脾散磨積理疳用化癖丸治釀瀉沒石子丸然此積滯之疾非七劑可療必須次第調理日久自然平復矣痃痛者始則腹內一小長塊其硬如臂從腰纏轉或左或右良久痛甚則見於皮下不思乳食其症先因有痰表解未盡遽爾下之太過氣虛寒搏鬱結而成法宜益氣脾虛用參苓白朮散沉香檳榔丸為治蛔蟲動痛口吐清水涎沫或時吐蟲痛不堪忍其疾因食肥甘葷腥太早故胃寒蟲動作痛其蟲吐出或生或死兒小者此痛若甚亦致危難先以理中湯加烏梅煎服使胃暖不逆次使君子丸有兒大者面㿠白色而帶黃肉食倍進肌體消瘦腹中時痛此有血鱉蛔蟲集乎其間以二聖丸下之可也又有胃受極寒極熱亦令蟲動或微痛或不痛遽然吐出法當安蟲為上若治蟲反傷胃氣固不可也因寒而動者用理中湯加烏梅煎因熱而動者用五苓散加烏梅水薑煎服積痛者腹中隱隱而痛面黃不食兒大吐酸溲氣先治積滯後調脾胃其痛自止仍辨虛實和解治法詳傷積論癖痛者癥瘕痃癖四症大同小異總名積聚詳見積聚論中臟寒痛附胎寒論內盤腸內吊痛在夜啼論內吊腎偏墜痛當理腎和氣論在陰囊腫內寒疝痛詳在疝症內附方白芍藥湯芍藥澤瀉薄桂甘草烏梅散鉤藤乳香元胡沒藥烏梅肉粉草醒脾散人參砂仁黃芩藿香白朮丁香南星甘草化癖丸見積聚症內沒石子丸沒藥赤石脂訶子參苓白朮散見霍亂症內沉香檳榔丸沉香檳榔木香丁香三稜莪朮神麯厚朴蒼朮青皮陳皮砂仁益智枳殼良薑香附穀芽使君子理中湯見驚風症內使君子丸檳榔大黃使君子酸石榴皮二聖丸檳榔一兩巴豆十五粒去殼膜心略去油入檳榔木杵丸如緑豆大服後蟲下飲稀粥自安或用黑醜亦可五苓散見驚風症內胃脘痛附心痛總括心痛原來在胃脘若還真者是膏肓九種根因須審問寒食蟲火更多防脈法洪大屬火熱滑大屬痰右手實屬積沉滑有食弦遲有寒沉細而實者可治堅大而實浮大而長滑而利數而緊皆難治其心痛手足俱青至節者不治內經曰少陽司天風行於地心痛胃脘痛膈不通又云木鬱之發民病胃脘當心而痛上交兩脅膈臆不通食飲不下蓋風木之氣被郁發則太過故民病有土敗木賊之候也然心與胃各一臟其病形不同因胃脘痛處在心下故有當心而痛之名乃丹溪有胃脘痛即心痛此言非也蓋胃是真濕土也胃居中焦稟沖和之氣多氣多血是水穀之海為三陽之總司五臟六腑十二經脈皆受氣於此是以壯則氣行而愈弱則著而成病其沖和之氣變至偏寒偏熱因之水穀不消停留水飲食積真氣相搏以致清陽不升濁陰不降而肝木之邪得以乘機侵侮而為病矣然致病之因多因縱恣腹口喜好辛酸生冷煎煿脆硬之物朝傷暮損日積月深自郁成積自積成痰痰火煎熬血亦妄行痰血相雜妨礙升降故胃脘作痛俗醫不究其源例以辛香燥熱之劑治之以火濟火遂成危劇良可痛哉古方有九種心痛曰飲曰食曰風曰冷曰熱曰悸曰蟲曰疰曰去來痛夫所謂冷者特一耳貴在醫者神悟不可例以熱藥治之也詳其所由皆在胃脘而實不在心也有寒熱火實死血食積痰蟲之異耳寒厥痛者手足冷而通身冷汗出便利溺清或大便利而不渴氣微力弱宜以朮附湯溫之熱厥痛者身熱足冷痛甚則煩躁而吐額自汗出脈洪大宜以金鈴子散加減之火實痛者因氣而食卒然發痛大便或閉久而注悶心胸高起按之愈痛不能飲食宜微利之死血痛者痛有常處不動移者是也食積者痛甚欲大便去後痛減者是也痰痛者隱隱然痛得辛熱湯則暫止者此痰也真心痛者必死不可治蓋謂包絡引邪入於心之正經耳夫心之臟君火也是神靈之舍與手少陰之經皆不得而受傷故也又平時喜食熱物以致死血留於胃口作痛者宜桃仁承氣湯下之補遺丹溪曰凡胃脘痛必用溫藥此是鬱結不行阻氣不運故痛在下者多屬濕宜溫利之大凡心痛須分新久若明知身受寒氣口吃寒物而得者於初得之時當溫散或溫利若病得之稍久則成郁久鬱則成熱熱久而生火原病式中備言之矣若欲行溫散溫利寧無助火添病耶由是多以山梔為熱藥之嚮導則邪易伏病易退正氣伏而愈矣用山梔十五枚大者九枚去皮炒黑煎佐以薑汁令辣服之或加川芎一錢或以二陳加川芎蒼朮倍子煎服甚者加乾薑輕者以麻黃桂枝之類散之氣虛人胃脘作痛草豆蔻丸服之附方草豆蔻丸草豆蔻橘紅人參乾薑黃耆益智當歸青皮澤瀉半夏桃仁麥芽神麯薑黃柴胡為末炊餅和為丸薑湯下加吳茱萸生熟甘草朮附湯見驚風症內金鈴子散金鈴子肉元胡索各一兩為末服之痛止服枳朮丸枳朮丸枳實白朮桃仁承氣湯見痢疾症內腫脹總括古今議定有脾虛大抵多從溫熱為十種根因各調理詳分補瀉在臨機脈法水病浮大者可治細微者難治腹脹脈浮者易治病虛則難療也內經曰諸濕腫滿皆屬於脾又曰諸腹脹大皆屬於熱夫脾喜燥而惡濕常感濕氣濕蘊為熱熱久又生濕濕熱相生而腫脹矣其所受病者何也蓋人所賴以生者水穀也水則腎主之谷則脾主之惟腎虛不能行水脾虛不能制水胃與脾合胃為水穀之海因虛不能傳化故腎水泛溢浸漬脾土於是三焦停滯經絡壅塞水滲於皮膚注於肌肉而成腫脹也腫乃水腫脹乃腹脹須分別治之腫之病不一洛陽稱腫為痼疾知病之危惡甚矣有感濕作腫有風閉塞作腫有食積作腫有病後作腫總宜補中行濕利小便身有熱者水氣在表可汗實者水氣在裡可利小便切不可輕下以耗真氣經曰壯者氣行則愈怯者著而成病也若遍身浮腫煩渴小便赤澀大便閉結此屬陽水先五皮湯次四磨湯加生枳殼重者疏鑿飲子若遍身腫不煩渴大便溏小便少不澀赤此屬陰水宜實脾散或木香流氣飲主之陽水病兼陰症者脈必沉數陰水病兼陽症者脈必沉遲氣若陷下用二陳加升提之藥能使大便潤而小便長如腹脹少加厚朴佐之氣不運加木通木香陳皮以調之有小兒初腫便覺痰嗽喘急此屬肺腎所主宜先解表散次投定喘消痰利便之劑用商陸丸內經曰開鬼門潔淨府此之謂也夫脹者因飲食勞倦損傷脾胃不能運化精微以制水穀聚而不散故成脹也實者可下之其症時時飲水能食小便黃時微喘脈伏而實是也其脾初虛而後有積治宜先補脾然後下之下後又補脾即愈也不可補肺恐生虛耳盧氏云醫鏡以水腫隸屬於腎肝胃而及脾又肺金盛而生水水溢妄行豈理也哉夫脾土受病肺為之子固不能自盛而生水然肺金氣清而能生水則滋長腎陰奉行降令為生化之源何病腫之有今為腫亡水乃腐濁之氣滲透經絡流注溪谷灌入隧道血亦因之而化水欲藉土以制之導腎氣以利之殊不知脾病則金氣衰木寡於畏而來侮土脾欲不病不可得矣治法宜清心經之火補養脾土全運化之職肺金下降滲道開通其精之清者復生為氣血為精液敗濁者在上為汗在下為溺以漸而分消矣批經曰至陰者腎水也少陰者冬脈也其本在腎其末在肺皆積水也又曰腎者胃之關也關門不利故聚水而成其類也王節齋云先喘而後脹者主乎肺先脹而後喘者主乎脾凡腫病見大便滑泄唇黑缺盆平臍突足平背平或肉硬或手掌平又或男從腳腫下而上女從身上腫而下並不治也遍身光腫指按成窟舉手即滿者屬脾虛不能制水水漬妄行故也治當補脾脾氣實則自健運不可妄下治腫大法宜補中行濕利小便以參朮為君蒼朮陳皮茯苓為臣黃芩麥冬為使以制肝少加厚朴以制腹脹氣滯加木香木通氣陷加升麻柴胡提之血虛補血痰盛利痰隨症加減為妙早寬暮急屬陰虛早用四物加參朮夕用地黃丸加膝前車桂附之類早急暮寬屬陽虛早用六君子湯夕用地黃丸如前加減東垣云寒脹多熱脹少皆主於脾胃附方五皮湯五加皮地骨皮茯苓皮薑皮大腹皮一方去加皮加桑皮四磨湯木香沉香臺烏檳榔枳殼疏鑿飲子赤小豆大腹皮茯苓皮椒目澤瀉木通商陸羌活檳榔秦艽實脾散白朮香附木香草果木瓜檳榔茯苓薑皮甘草木香流氣飲方未見二陳湯見諸吐症內商陸丸商陸一兩黃連五錢薑汁為丸紫蘇湯下解表散麻黃杏仁赤茯苓川芎防風枳殼甘草
